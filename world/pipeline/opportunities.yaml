    status: implemented
    rationale: |
      The lore bible states goblins press from the north and west. A hostile
      wood zone to the west of Firdale gives that threat a physical location,
      provides the game's first combat content, and gives the guard_captain
      something concrete to send players toward. Without it, the village has
      no exterior and no reason for players to leave. Factions present: goblin
      raiders. Militia presence is absent here by design.
