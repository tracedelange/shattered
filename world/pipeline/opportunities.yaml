world_summary: |
  Nine zones are live and the major arcs (goblin_castle, the Gardener bowl
  thread, the mill economics) all have at least a first quest beat. Firdale has
  a guardhouse and active village_guard spawns but no interior to match the
  tavern and sewers, and the guard faction has dialogue depth without a space of
  its own. This run focuses on a Firdale barracks: an interior zone with guards,
  a captain, and a sealed cell holding a prisoner nobody will discuss. Two prior
  opportunities remain pending and are carried forward unchanged.
opportunities:
  - id: opp_043
    type: faction_presence
    priority: 0.65
    status: implemented
    rationale: |
      Grundar is dead. The March acknowledged the kill. The goblin_castle zone
      now has no faction presence that reflects the post-Grundar state — only
      respawning goblins and hobgoblins that belong to a leaderless warband.
      A single March advance scout at the approach signals the March has begun
      observing the site without committing to occupation. This is the minimum
      footprint that answers the unresolved lore-bible thread about March
      intentions toward the Hold.
    target_zone: goblin_castle
    suggested_additions:
      - |
        The march_scout mob file already exists at
        world/entities/mobs/march_scout.yaml (level 38, idle, herald-register
        dialogue). It is not yet spawned anywhere. This opportunity reduces to a
        spawn placement only.
      - |
        Add a march_scout spawn to the approach region of goblin_castle.yaml:
        count 1, no respawn. The scout arrived after Grundar fell. Placement in
        the approach — not the keep — reads correctly: the March has interest,
        not occupancy.
    lore_hooks:
      - |
        The march_herald at starting_village and the march_scout at the Hold are
        the same faction in different modes: presence versus reconnaissance. Their
        dialogue should feel like the same organization operating at different
        distances from authority.
      - |
        Whether the scout remains, reports back, or is joined by others is
        unresolved. Define only when a March faction arc demands a specific answer
        about the organization's intentions toward the Hold.
    complexity: low
    implemented_at: '2026-06-06T01:01:56.779Z'
  - id: opp_045
    type: refactor_lore
    priority: 0.4
    status: pending
    rationale: |
      The lore bible zones list contains two entries for the same location:
      firdale (no implemented date, connections: tavern, dark_forest,
      river_crossing) and starting_village (implemented 2026-05-31, same three
      connections). Neither entry includes southern_ruins despite the zone file
      clearly connecting south to southern_ruins. The firdale entry also describes
      goblins camped to the west — stale since opp_008 removed them. Both entries
      will mislead future Gardener analysis.
    target: bible.zones[id=firdale] and bible.zones[id=starting_village].connections
    contradiction: |
      Two entries describe one location. The firdale entry is stale (pre-opp_008
      goblin camp, three connections, no implemented date). The starting_village
      entry is the canonical record but omits the south connection to
      southern_ruins, which the zone file implements. A Gardener reading either
      entry gets an incomplete picture of the zone graph.
    resolution: |
      Remove the firdale entry. Update starting_village connections to include
      southern_ruins. The village_sewers connection is via portal rather than
      directional edge — omitting it from the connections list is correct, but
