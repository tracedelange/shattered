world_summary: |
  The anchor neighborhood centers on zone_23_12 (Surface Oasis), a named desert zone 
  with a stone shrine and well entrance. It feeds down into a two-level dungeon 
  (Sunken Temple Halls -> Obsidian Pool) already populated and named. The surrounding 
  tier-1 and tier-2 desert/grassland zones are mostly undeveloped stubs. The region 
  needs a unifying arc that makes the shrine and its depths feel like a destination 
  rather than an isolated dungeon — and the surrounding wilderness needs to reflect 
  a world responding to the sacred (or corrupted) presence beneath.
sagas:
  - id: saga_the_oath_breach
    title: The Oath Breach
    status: active
    anchor_zone: zone_23_12
    neighborhood:
      - zone_23_12
      - zone_23_12_sunken_halls
      - zone_23_12_obsidian_chamber
      - zone_23_11
      - zone_23_13
      - zone_24_12
      - zone_24_11
      - zone_24_13
      - zone_22_12
    motif: |
      An ancient oath binds a guardian to its post, a vow older than the stones it 
      sits upon. Something woke it. The warden does not hunger — it *protects* — but 
      the thing it guards has been wronged. The shrine on the surface was built by 
      those who made the oath. Now pilgrims come seeking blessing while the deep 
      chambers fill with pale supplicants, marked by the same wrongness that haunts 
      the guardian. The oath is cracking.
    secret: |
      The Warden was bound by an oath made in the age before the Creator's shattering. 
      It is not a creature at all but a fragment of the old world's will, given form 
      in stone. The pale supplicants are not invaders—they are pilgrims transformed 
      by the Warden's corrupted power, drawn to the Obsidian Pool by something that 
      was once noble and has rotted. A shard god has touched the oath's seals and is 
      slowly poisoning the covenant.
    escalation:
      - stage: surface_signs
        summary: Pilgrims and scorpions mark a shrine growing restless; hints whisper of corruption below.
        level_band:
          tier: 1
          minLevel: 1
          maxLevel: 5
        status: pending
        realized_by: []
      - stage: corrupted_halls
        summary: The sunken temple echoes with ritual gone wrong; pale things move where priests once knelt.
        level_band:
          tier: 2
          minLevel: 8
          maxLevel: 12
        status: pending
        realized_by: []
      - stage: the_warden
        summary: Confront the Warden in the Obsidian Pool and learn why the oath is breaking.
        level_band:
          tier: 3
          minLevel: 12
          maxLevel: 18
        status: pending
        realized_by: []
