    status: implemented
    rationale: |
      After removing hostile spawns (opp_008), the starting_village becomes structurally sparse: a plaza, an inn, and a market with a single merchant. The lore bible describes Firdale as a functioning provincial village on an old road. Civic infrastructure — a fountain, a guardhouse, and villagers going about their lives — is the minimum required to make the village feel inhabited rather than staged. The guardhouse also introduces the village guard as a faction anchor distinct from the Wardens, who operate at the river.
    target_zone: starting_village
    suggested_additions:
      - Add a fountain or well region at the center of town_square (stone_floor inset, landmark tile) — civic anchor and natural gathering point
      - Add a guardhouse region west of the plaza, replacing the removed goblin_camp space — walled building with a door, 1–2 village_guard spawns
      - Expand the market with a second merchant spawn or a stall sub-region — the market currently has one NPC and no ambient life
      - Add citizen spawns (3–5) distributed across the plaza and market — idle, no aggro, dialogue that colors the village's mood
    lore_hooks:
      - The old road runs through Firdale — a well or fountain at the crossroads is canonical for a waystation village
      - The March's authority is thin; a local guard force (answerable to the village, not the Wardens) establishes that local power exists and is distinct
    complexity: medium
    implemented_at: '2026-05-31T14:55:59.509Z'
