  - id: opp_055
    type: add_quest
    priority: 0.7
    status: implemented
    rationale: |
      where_the_road_ends returns with no body and no scout. The prisoner's
      line "Some went north and did not come back. Some came back. I won't
      say which I am" is the world's sharpest unresolved beat. The barkeep
      notices things others miss and has been in Firdale longer than anyone
      admits. A barkeep-issued quest that sends the player to stand at the
      cell bars and then ask the captain is the correct next step: it
      activates the prisoner as a narrative presence without resolving who
      they are. No new zones or entities required.
    suggested_id: what_the_watch_keeps
    suggested_name: What the Watch Keeps
    giver: tavern_barkeep
    giver_zone: tavern
    unlock_after: where_the_road_ends
    suggested_stages:
      - |
        start: The barkeep notes, without leading the player, that the guards
        have been different lately. Someone came back from the north in a way
        that is not quite coming back. The barkeep does not explain the
        distinction. Talk-to-giver stage.
      - |
        visit_cell: Go to the firdale_barracks and get close enough to speak
        with whoever is in the cell. Objective kind: reach, template_id:
        prisoner, zone: firdale_barracks, radius: 3. The player can stand at
        the bars (y:7) and trigger the prisoner's dialogue. The prisoner will
        not say who they are. That is the correct outcome.
      - |
        ask_captain: Ask the militia captain about the prisoner. Objective
        kind: talk, target_template: guard_captain. The captain's response is
        a single line in their established register: "Cell is watch business.
        Leave it." No new dialogue required.
      - |
        report_back: Return to the barkeep with what you found. Talk-to-giver
        stage. The barkeep listens without surprise. Closing line: "So.
        Someone went north. Interesting where they came back from." No
        elaboration. The barkeep does not distinguish "came back from the
        north" from "came back from wherever." All readings stay open.
    rewards:
      - xp: 85
      - gold: 45
    lore_hooks:
      - |
        The barkeep's closing line deliberately does not identify the prisoner.
        The player who completed where_the_road_ends will draw their own
        conclusion. No NPC confirms it.
      - |
        The prisoner's existing dialogue already handles the encounter:
        "Some went north and did not come back. Some came back." No prisoner
        mob changes required.
      - |
        The captain's existing dialogue line "The cell is watch business.
        Leave it." covers the ask_captain beat. No guard_captain changes
        required.
    complexity: low
    implemented_at: '2026-06-06T02:10:33.800Z'
  - id: opp_056
    type: add_quest
    priority: 0.62
    status: implemented
    rationale: |
      The ruins_scholar now holds three confirmed bowl accounts in their
      notes. The barkeep holds the oldest surviving record of the same
      measurement, predating Firdale by at least one age. These two characters
      have never been connected. A scholar-issued quest that sends the player
      to carry the compiled notes to the barkeep and bring back their response
      is the natural next beat in the Gardener arc. It introduces no new zones
      or entities and closes a long-running gap between the Gardener arc's
      academic thread and its oldest witness.
    suggested_id: the_oldest_record
    suggested_name: The Oldest Record
    giver: ruins_scholar
    giver_zone: village_sewers
    unlock_after: the_third_account
    suggested_stages:
      - |
        start: The scholar has three sites in their notes. The same measurement,
        three times. They have heard the barkeep at the Split Crown has been
        there a long time — longer than anyone accounts for. They will not go
        to the tavern themselves. The player can carry the notes. Talk-to-giver
        stage.
      - |
        speak_to_barkeep: Take the scholar's measurements to the barkeep at
        the Split Crown. Objective kind: talk, target_template: barkeep. The
        barkeep should receive the numbers without surprise and give the player
        something to bring back. Suggested closing: "Same measure. Three times.
        Tell your scholar: I have been measuring this longer than they have been
        alive. What to do with it is a different question." The barkeep does
        not elaborate on what they mean by measuring or where.
      - |
        report_back: Return to the scholar in the masonry hall with the
        barkeep's response. Talk-to-giver stage. The scholar's closing beat
        should be their most unsettled moment in any quest: not relief, not
        excitement. Something worse. "Longer than they have been alive. Of
        course." Then silence. Their notes grow. The conclusions column stays
        blank.
    rewards:
      - xp: 80
      - gold: 45
    lore_hooks:
      - |
        The barkeep's line implies direct knowledge of the bowl measure, not
        just the ledger. How they know, how long they have known, and what
        "measuring" means in their context is unresolved. Define only when a
        Gardener-focused arc demands the barkeep's origin.
      - |
        The scholar's closing does not produce a conclusion. Three sites, one
        oldest witness, still no answer. That is the correct state of the
        Gardener arc at this stage.
    complexity: low
    implemented_at: '2026-06-06T02:12:28.925Z'
