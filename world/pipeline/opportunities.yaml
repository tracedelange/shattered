  - id: opp_037
    type: new_zone
    priority: 0.82
    status: implemented
    rationale: |
      The dungeon interior of the Goblin Hold — accessed via portal in the
      exterior courtyard (opp_031). This is the deepest and most mechanically
      complex zone in the world: branching rooms, progressive difficulty, a
      secret room placeholder, and the boss fight. Separating the dungeon from
      the exterior gives each zone a single purpose and a distinct visual register.
      The dungeon is where the assault arc (the_warlords_end, opp_035) plays out;
      the exterior is where the scout arc (into_the_hold, opp_034) reaches its
      reach objective before the player chooses to descend.
    suggested_id: goblin_castle_dungeon
    suggested_name: The Hold — Below
    theme: pre-Shattering stone dungeon, progressive combat, branching rooms, boss fight
    factions:
      - goblin_warband
    lore_hooks:
      - |
        The dungeon was not built by the warband. The stone cutting and jointing
        match the_old_stones and the ruin fragment in dark_forest — same
        tradition, underground. The warband moved in because it was defensible,
        not because they understood it.
      - |
        Each room deeper in the hold is more intact than the last. The Shattering
        damage propagated outward, not inward. The floor of the throne room is
        in near-original condition. A player who has seen the_old_stones will
        recognize the stonework.
      - |
        Grundar chose the innermost room because it is the most defensible.
        He calls it a throne room with nobody listening.
    suggested_additions:
      - |
        Tileset: dungeon (opp_039). Width: 80, height: 60,
        default_tile: cracked_stone_floor.
      - |
        Room layout — six rooms, one branch, one convergence:

        entry_hall (rect w:14 h:8) — portal arrival point; a long waiting
        chamber. The first encounter, lightly held. Torch brackets on walls.
        Narrowness signals to the player: this is not a camp.

        barracks (rect w:18 h:14) east of entry_hall — the main living
        space. Wider than entry_hall. Noise scatter of a second floor tile
        over cracked_stone_floor implies refuse and bedrolls without
        requiring new entities. Four hobgoblins. The space conveys
        that the warband has been here long enough to settle.

        [BRANCH NORTH] armory (rect w:12 h:10) north of barracks — weapon
        storage implied by wall density and loot table. Three elite
        hobgoblins. Better loot drop pool than barracks spawn. The stone
        here is noticeably more intact: the armory is the oldest room
        reached so far.

        [BRANCH SOUTH] dungeon_cells (rect w:12 h:10) south of barracks —
        narrow passages and dense walls imply cells without requiring a
        dedicated cell entity. Three goblins (conscripts or prisoners —
        deliberately ambiguous). A wall inscription entity (lore fragment,
        pre-Shattering language, untranslated) placed at the south wall.
        Dead end; player returns through barracks to continue east.

        great_hall (rect w:20 h:16) east of barracks, both branches
        reconnect here — the largest room and the convergence point.
        Six hobgoblins including the first sign of command rank (dialogue
        or name tag if supported). The stone is intact. The scale of the
        room is jarring after the narrow passages.

        throne_passage (rect w:6 h:22) north of great_hall — a long,
        narrow corridor with no enemies. Pacing beat. The stone cutting
        is the finest in the dungeon; this is the original approach to
        whatever this building was for. Torch brackets every 4 tiles.

        throne_room (rect w:16 h:14) north of throne_passage — Grundar's
        chamber. Fully intact pre-Shattering stone. The "throne" is a
        raised stone platform at the north wall (region or entity).
        Grundar spawns center-north. No other enemies on spawn; the room
        reads as his alone.
      - |
        Secret room (forward-looking placeholder): cracked_wall tile at
        armory east wall. Not interactive until cracked_wall mechanic lands
        in a future opp. At implementation time, add vault (rect w:6 h:6)
        east of armory with rare loot. Leave tile in place as decoration —
        a player who notices it will wonder; it does not block anything.
      - |
        Spawns: hobgoblin (entry_hall, count:2, respawn:150),
        hobgoblin (barracks, count:4, respawn:150),
        hobgoblin (armory, count:3, respawn:180),
        goblin (dungeon_cells, count:3, respawn:120),
        hobgoblin (great_hall, count:6, respawn:180),
        hobgoblin_warlord (throne_room, count:1, spawn_id:hobgoblin_warlord,
        no respawn).
      - |
        Connections: portal_return to goblin_castle at entry_hall west wall —
        the player can exit the way they came. Named portal connection;
        requires opp_038.
    complexity: high
    dependencies:
      - opp_031
      - opp_032
      - opp_033
      - opp_038
      - opp_039
    implemented_at: '2026-06-04T04:47:12.347Z'
  - id: opp_038
    type: new_mechanic
    priority: 0.85
    status: superseded
    rationale: |
      Zone connections in the current schema are strictly directional
      (north/south/east/west) and triggered by walking off an edge.
      goblin_castle_dungeon (opp_037) requires a non-directional connection:
      a portal entity inside the courtyard that transitions the player to
      a different zone without edge walking. This is also the first
      sub-zone connection — two zones representing the same physical
      location at different vertical levels. Once implemented, the mechanic
      opens vertical zone design (caves beneath overworld zones, upper floors,
      underwater areas) for all future content with no additional schema
      changes required.
    affected_systems:
      - zone connection resolution
      - player zone transition handler
      - zone YAML schema (connections field)
      - portal entity type
    suggested_design:
      - |
        Extend the connections schema with a portals list alongside the
        existing directional fields:
          connections:
            west: dark_forest
            portals:
              - id: descent_portal
                target_zone: goblin_castle_dungeon
                target_spawn: entry_hall
                entity: portal
                region: portal_alcove
        The portal entity placed in the region is the interactive trigger.
        On player interaction or proximity threshold, execute zone transition
        to target_zone at target_spawn region center.
      - |
        The return connection from goblin_castle_dungeon mirrors the schema:
          connections:
            portals:
              - id: ascent_portal
                target_zone: goblin_castle
                target_spawn: portal_alcove
                entity: portal
                region: entry_hall
                at: west_wall
      - |
        Portal entity visual: a distinct tile from opp_039 (portal tile,
        color #5a30c0). Not animated initially — a distinct color and tile
        ID is sufficient. Interaction prompt: "Descend into the Hold" /
        "Ascend to the courtyard."
    complexity: high
    blocking:
      - opp_031
      - opp_037
    implemented_at: '2026-06-04T04:16:44.589Z'
