    rationale: |
      The dark_forest hollow is described as feeling "watched" and the lore bible names
      something in the forest as older than the village, older than the road, possibly
      older than the last age entirely. The hollow is entirely empty — no interactable,
      no spawn, no revelation — yet the only active quest (the_missing_farmer) sends
      players here expecting to find something. Players arrive and find a bare clearing.
      Depth-before-breadth: dark_forest must have payoff content before any zone can
      branch from it. The hollow is also the natural site for a Gardener or Shard god
      lore hook — the most underdeveloped corner of the current world.
    target_zone: dark_forest
    suggested_additions:
      - |
        Add an interactable at the hollow center: a standing stone, a cairn, or a
        marker bearing script in no surviving language — no maker's mark, no date
      - Add a farmer_remains object or downed NPC spawn north of the clearing to give the_missing_farmer a physical resolution point
      - |
        Add a narrow ruin fragment or collapsed threshold north of the hollow — implies
        something was here before the forest grew over it; no builder named, no
        faction assigned yet
      - |
        Make the "feels watched" hook mechanical: a passive effect or ambient entity
        that triggers when the player lingers in the hollow for several seconds
    lore_hooks:
