generated_at: '2026-06-04T12:00:00Z'
world_summary: |
  Nine zones are live. The goblin_castle arc is complete — Grundar dead, the
  March acknowledged, the Hold leaderless. The Gardener mystery thread now spans
  four zones and six matched evidence instances (three bowl depressions, four
  script-tradition sites, concentrated hollow watchers) but no quest connects
  the sites. The_old_stones is the world's most content-rich zone with no quest.
  Economic threads (mill rebuild, scavenger dig) stalled after first-beat quests.
  The March has no physical presence east of Firdale after Grundar's death. All
  prior opportunities are implemented or superseded; the list below is new work.
opportunities:
  - id: opp_040
    type: add_quest
    priority: 0.82
    status: implemented
    rationale: |
      The_old_stones is the Gardener arc's narrative apex — origin of the script
      tradition, most concentrated hollow_watcher site, first instance of the bowl
      depression. The hermit has meaningful dialogue but no quest to drive players
      through the site. Without a quest, most players speak to the hermit once and
      leave without reaching the inner sanctum, which is the arc's most charged
      discovery and the one that pays off both beneath_the_square and
      what_the_ledger_says retroactively.
    suggested_id: the_keepers_circuit
    suggested_name: The Keeper's Circuit
    giver: old_stones_hermit
    zone: the_old_stones
    theme: standing circle exploration, inner sanctum, Gardener arc discovery
    stages:
      - id: start
        text: |
          The hermit says the seven inscriptions in the circle are not the same.
          Most people do not notice that. Walk the circle and find out what you do.
        on_complete: walk_the_circle
      - id: walk_the_circle
        text: |
          The standing circle is in the western courtyard. Seven stones, seven
          cuts, none identical. Get close enough to examine each face.
        objective:
          kind: reach
          zone: the_old_stones
          x: 8
          'y': 28
          radius: 6
        on_complete: enter_sanctum
      - id: enter_sanctum
        text: |
          The hermit mentioned a room at the complex's north end. The watchers
          do not leave it. Press north through the central hall and find it.
        objective:
          kind: reach
          zone: the_old_stones
          x: 27
          'y': 6
          radius: 4
        on_complete: report_back
      - id: report_back
        text: Return to the hermit and tell them what you found.
        on_complete: done
    lore_hooks:
      - |
        The inner sanctum contains the bowl depression — same dimensions as the
        sealed room dais beneath Firdale. Players who completed beneath_the_square
        or what_the_ledger_says will recognize the measurement without any NPC
        naming the connection.
      - |
        The hermit's closing response stays in register. They already knew what
        the player would find. "You found it, then. Most do not go that far."
        No explanation offered.
      - |
        Note: x/y coordinates for walk_the_circle and enter_sanctum are
        approximate estimates from the zone's relative-positioning ops.
        Implementer should verify against the rendered zone layout.
    rewards:
      - xp: 130
      - gold: 70
    complexity: low
    implemented_at: '2026-06-04T11:34:28.098Z'
  - id: opp_041
    type: add_quest
    priority: 0.75
    status: pending
    rationale: |
      The ruins_scholar has been measuring the sealed room's bowl depression and
      recording exact dimensions (61 cm wide, 12 deep). The same dimensions appear
      at the_old_stones inner sanctum, which the scholar does not know exists. A
      quest that sends the player north to compare the two sites connects the
      Gardener arc's deepest thread across two factions without resolving what the
      three bowl sites mean. Low cost: no new entities, no new zones.
    suggested_id: the_same_measure
    suggested_name: The Same Measure
    giver: ruins_scholar
    zone: village_sewers
    unlock_after: beneath_the_square
    theme: Gardener arc cross-site comparison, bowl depression, ruins_scholar arc
    stages:
      - id: start
        text: |
          The scholar has measured the bowl four times. The dimensions are
          consistent. They ask whether you have seen anything like it elsewhere —
          same stone character, same depression, same absence of a surviving channel.
        on_complete: find_the_sanctum
      - id: find_the_sanctum
        text: |
          North of the dark forest is a ruin complex called the old stones. The
          scholar has heard of it secondhand and will not go themselves. Reach the
          innermost room and note what is there.
        objective:
          kind: reach
          zone: the_old_stones
          x: 27
          'y': 6
          radius: 4
        on_complete: report_back
      - id: report_back
        text: Return to the scholar in the masonry hall with your observations.
        on_complete: done
    lore_hooks:
      - |
        The scholar's closing response should be their most unsettled moment —
        not excitement, something worse. They have been alone with a measurement
        that should be unique. Now it is not. "The same measure. Of course it is."
        They do not elaborate. They do not need to.
      - |
        opp_040 and opp_041 share the same reach objective (the_old_stones inner
        sanctum). If both quests are active simultaneously, both advance on the
        same player action. That is correct behavior — the site exists once.
    rewards:
      - xp: 100
      - gold: 55
    complexity: low
  - id: opp_042
    type: add_quest
    priority: 0.68
    status: pending
    rationale: |
      Three_seasons_nothing cleared the west threshold and surveyed the east mound
      but left the dry_well untouched. The scavengers said nothing about it, which
      is the tell. The dry_well at the central_ruin is the third instance of the
      bowl depression — same dimensions as the dais beneath Firdale and the inner
      sanctum at the_old_stones. A follow-on quest that brings the player to the
      well closes the Gardener arc's southern thread and pays off the scavenger
      faction's three-season evasion.
    suggested_id: the_dry_well
    suggested_name: The Dry Well
    giver: ruins_scavenger_elder
    zone: southern_ruins
    unlock_after: three_seasons_nothing
    theme: scavenger arc resolution, dry well, Gardener arc southern thread
    stages:
      - id: start
        text: |
          The scavenger elder has been looking at the dry well inside the central
          ruin for three seasons and not touching it. They will not say why. They
          ask you to look at it yourself and report what you find.
        on_complete: examine_well
      - id: examine_well
        text: |
          The dry well sits in the southeast corner of the central ruin's interior —
          a stone ring, no water, old waterline staining at the rim. Get close enough
          to read the marks.
        objective:
          kind: reach
          zone: southern_ruins
          x: 38
          'y': 31
          radius: 2
        on_complete: examine_inscription
      - id: examine_inscription
        text: |
          The carved stone fragment inside the ruin was face-up when the scavengers
          arrived. They have not moved it. Examine it before you go.
        objective:
          kind: reach
          template_id: carved_stone
          zone: southern_ruins
          radius: 1
        on_complete: report_back
      - id: report_back
        text: Return to the scavenger elder and report what the well showed you.
        on_complete: done
    lore_hooks:
      - |
        The dry well's interior shows the same waterline staining as the sealed
        room dais and the inner sanctum at the_old_stones. The scavenger already
        knows this — they have been avoiding it because knowing it leads somewhere
        they have not decided to go. The player's report confirms what the elder
        could not bring themselves to check. Their closing response should not be
        relief. "Right. That is what I thought it would say."
      - |
        Three sites, same measure: southern_ruins, village_sewers, the_old_stones.
        No NPC in this quest names the connection. It is there for players who have
        been to the other two.
    rewards:
      - xp: 90
      - gold: 50
