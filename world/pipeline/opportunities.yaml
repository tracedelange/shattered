world_summary: |
  The zone graph is coherent but weighted north-south: the Gardener-mystery arc
  (village_sewers to the_old_stones) is the deepest narrative spine. The March
  faction now has a military endpoint: the goblin_castle arc spans two zones —
  an exterior (forest approach, ruined castle facade) and an underground dungeon
  (goblin_castle_dungeon) accessed via portal. This is the most mechanically
  ambitious zone design to date: branching rooms, progressive difficulty, a
  boss fight, and a new named-portal connection type that opens vertical zone
  design for all future content. River_crossing work remains pending (opp_027,
  opp_029, opp_030). Portal mechanic (opp_038) and dungeon tileset (opp_039)
  are infrastructure prerequisites for the dungeon zone (opp_037). The quest
  arc (into_the_hold → the_warlords_end) spans three zones; opp_035's
  kill_count zone reference needs revision after the zone split lands.
