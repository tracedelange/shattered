  - id: opp_051
    type: add_quest
    priority: 0.62
    status: pending
    rationale: |
      The march_scout at goblin_castle has been live since opp_043 but has
      no quest. Post-Grundar, the March needs a count of what remains below.
      The scout cannot leave the approach perimeter; the player can descend.
      This activates the march_scout as a faction voice, gives
      goblin_castle_dungeon a second visit reason after the_warlords_end,
      and advances the post-Grundar warband thread without resolving it.
    suggested_id: the_holds_account
    suggested_name: The Hold's Account
    giver: march_scout
    giver_zone: goblin_castle
    unlock_after: the_warlords_end
    suggested_stages:
      - |
        start: The scout has been watching the Hold since Grundar fell. They
        want a count of what remains below. Not a campaign. A number.
        Talk-to-giver stage.
      - |
        descend: Enter the dungeon through the throne room portal and confirm
        the warband is still present. Objective kind: reach, template_id:
        hobgoblin, zone: goblin_castle_dungeon, radius: 5. The hobgoblins in
        the entry_hall will trigger this on arrival.
      - |
        clear_remnants: Engage what remains of the warband. Objective kind:
        kill_count, template_id: hobgoblin, zone: goblin_castle_dungeon,
        target: 6. The dungeon has 15 hobgoblin spawns across five regions;
        six is a meaningful engagement, not a full clear.
      - |
        report_back: Return to the scout with the count. Talk-to-giver stage.
        The scout acknowledges the number without acting on it visibly.
    rewards:
      - xp: 130
      - gold: 70
      - item: iron_helmet
    lore_hooks:
      - |
        Scout closing line, in register: "The March has the number. What it
        does with it is not my brief." Whether the March moves on the Hold
        or leaves it to fracture on its own is unresolved.
      - |
        The dungeon's respawning hobgoblins mean the kill_count target is
        achievable on any visit. The dungeon does not need to be pristine
        from the_warlords_end run.
    complexity: low
