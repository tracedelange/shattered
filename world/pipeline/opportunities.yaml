world_summary: |
  Ten zones live with full quest coverage and no structural gaps. Three open
  threads carry the most weight: the prisoner in the barracks cell is the
  sharpest unresolved hook — where_the_road_ends returned with no body and
  no scout, and the prisoner's own dialogue points directly at that absence.
  The Gardener bowl arc now has three confirmed accounts in one scholar's
  notes but no convergence action between its three independent factions.
  The March has received three deliverables from the Hold (scout report,
  warlord kill, dungeon count) with no visible response. Separately: seven
  NPC sprites are absent from the overworld tileset, meaning citizen, herald,
  hollow_watcher, and four others render without registered colors. The
  starting_village is the only zone flagging no lore hooks.
