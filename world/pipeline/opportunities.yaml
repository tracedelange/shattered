      portal-only). Optionally note that the zone represents Firdale in all
      in-world text; the id discrepancy is an implementation artifact.
    complexity: low
  - id: opp_046
    type: new_zone
    priority: 0.83
    status: implemented
    rationale: |
      Firdale has an active guard faction (village_guard spawns, the signpost's
      "Order of the Firdale Militia", three guard-issued quests) but no interior
      to anchor it the way the tavern anchors the barkeep and the sewers anchor
      the scholar. A barracks gives the militia a home, a named commander, and a
      sealed cell whose prisoner nobody will name — a low-cost mystery hook that
      fits the unresolved civic-authority and missing-scout threads without
      resolving either. Portal-connected from the existing guardhouse, so it adds
      no directional branching and no sprawl.
    suggested_id: firdale_barracks
    suggested_name: The Firdale Barracks
    theme: militia command post, guard quarters, a sealed cell with one prisoner
    factions:
      - firdale_militia
    connection: |
      Portal-based from starting_village, mirroring tavern and village_sewers.
      Place a portal inside the existing guardhouse region (west of the town
      square, door on its east side) leading into the barracks muster hall, and a
      return portal back to the guardhouse tile. No directional edge is added;
      the zone graph is unchanged.
    suggested_additions:
      - |
        Interior zone like tavern: default_tile void, a single outer building
        shell (rect, walls with a south door) painted over with wood_floor and
        stone_floor; inner regions are floor-only so the space stays walkable.
        Suggested width ~34, height ~30. All coordinates below are approximate
        and the Implementer should verify against the rendered layout.
      - |
        muster_hall — the central common room and spawn_point. Two or three
        village_guard spawns drilling here, a rack of practice arms. This is the
        first thing the player sees: the militia is real and staffed.
      - |
        captain_office — a side room off the muster hall holding the new
        guard_captain (spawn_id firdale_guard_captain, count 1, no respawn).
        A desk, a wall map, the command center of the village's defense.
      - |
        bunk_room — guard quarters, bedrolls and footlockers; one more
        village_guard spawn off-duty. Texture only, no objective.
      - |
        cell_block — a short corridor along the building's back wall fronted by a
        row of the new cell_bars tile (see opp_049). Behind the bars is a
        floor-only cell the player cannot enter: no door, the bars are the only
        face and they are impassable. The prisoner (see opp_048) sits inside,
        visible through the bars, unreachable.
      - |
        Wire the portal pair into starting_village.yaml (guardhouse tile) and the
        new barracks zone. Add a firdale_barracks entry to the lore bible zones
        list with the militia faction and the portal-from-guardhouse connection.
    suggested_entities:
      - guard_captain
      - prisoner
    lore_hooks:
      - |
        The captain commands the militia and answers to "the village", not the
        March or the Wardens — the same distinction the village_guard dialogue
        already draws. The barracks makes that authority visible. Who the captain
        answers to above themselves stays unresolved; this zone does not name a
        council or an elder.
      - |
        The cell holds one prisoner. The guards will not say who, why, or how
        long. Leave the identity unresolved. It is a hook for a future arc, not an
        answer — the missing northern scout, a March matter, or something the
        militia took in and will not release are all live readings, none of them
        confirmed here.
    complexity: medium
    implemented_at: '2026-06-05T01:25:46.963Z'
