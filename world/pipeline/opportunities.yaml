world_summary: |
  The world has four fully implemented zones. The tavern has been deepened with proper regions and NPCs (opp_001–003 complete). The starting_village carries a structural contradiction: the lore bible says goblins are "tolerated at distance, not at the gates," yet the current zone places a goblin_camp connected by road directly to the town square, with goblin spawns inside the market. The village also lacks any civic infrastructure — no fountain, no guardhouse, no citizens — making it feel like a staging ground rather than a living settlement. Depth work on starting_village is the clear priority before any further branching.
