world_summary: |
  River_crossing is the world's first contested-territory zone and the focal point of
  a four-quest narrative spine (clear_the_mill → someone_for_the_mill → unresolved
  rebuild thread). Audit reveals the zone is functionally complete but spatially
  thin: lore-promised dock wreckage and the millrace are alluded to only through
  scatter noise; the east bank has no civilian presence; the warden_post_captain
  shares generic warden_guard dialogue; the cleared-mill arc has dangled since
  someone_for_the_mill ended with merchant interest but no spatial follow-through;
  and the zone YAML carries no factions field despite the Wardens being the
  unambiguous holding power. Depth-before-breadth: refine river_crossing before
  extending east of the river.
opportunities:
  - id: opp_026
    type: deepen_zone
    priority: 0.74
    status: pending
    rationale: |
      River_crossing lore explicitly names "dock wreckage" and "the stub of a dock"
      but the implementation only scatters stone_floor noise across the west_bank.
      The pre-Sundering industrial scene has no spatial substance — no specific
      barge hulk, no millrace channel between the river and the mill, no surveyable
      relic of the trade era the warden_guard dialogue refers to. Adding concrete
      structures gives someone_for_the_mill and any future rebuild arc something
      to anchor against, and converts the lore-hook from dialogue ornament into
      explorable space. The Wardens are the faction whose claim is justified by
      what they once protected — making that material strengthens their presence
      without adding new NPCs.
    target_zone: river_crossing
    suggested_additions:
      - |
        Add a dock_remains region (rect w: 6, h: 3, stone_floor) at the
        west_bank's eastern edge against the river_channel — the surviving
        footprint of the old barge landing, low and partial, suggestive
        rather than functional.
      - |
        Add a barge_wreck entity (idle, no aggro, no loot, 1 dialogue line in
        the carved_stone / hollow_watcher tradition of observation-as-flavor)
        spawned once at dock_remains — a hull half-submerged in the river
        margin, planking gone above the waterline. Static discovery.
      - |
        Add a millrace_stub region (rect w: 3, h: 8, dirt) connecting the
        ruined_mill's south wall down toward the river_channel — the dry
        channel that once drove the wheel. Adding this also resolves a
        spatial implausibility: the current mill has no visible water source.
      - |
        Adjust the existing crossing_dock_debris noise_patch to confine it
        to dock_remains rather than west_bank generally, so the debris reads
        as belonging to the landing rather than ambient grass scatter.
    lore_hooks:
      - |
        The warden_guard line "The old barge lines ran all the way to the
        delta, once. Not anymore" gains a visible referent — the barge_wreck
        IS that line, made spatial.
      - |
        The millrace stub completes the industrial picture without rebuilding
        the mill: the means of production are still there, the production is
        not. The Sundering's economic damage is visible in what survives, not
        in what is missing.
      - |
        No new faction needed — the Wardens claim what was, and now what was
        is present in the zone rather than only in dialogue.
    complexity: medium
  - id: opp_027
    type: faction_presence
    priority: 0.71
    status: pending
    rationale: |
      The river_crossing YAML carries no factions field, the only overworld zone
      besides dark_forest (where the hollow_watcher's affiliation is intentionally
      unresolved) to lack one. The Wardens Guild is the unambiguous holding power
      here — east bank, post, captain spawn_id, three of the zone's lore hooks
      attributed to them — yet they are not declared at the zone level. Separately,
      the warden_post_captain reuses the generic warden_guard mob with shared
      dialogue: the only named-by-spawn-id officer in the zone has no distinct
      voice. Both issues are coherence cleanup that the focus run is the right
      place to address: declare the faction, give the captain a mob file with
      dialogue that distinguishes a commanding officer from a posted guard.
    target_zone: river_crossing
    suggested_additions:
      - |
        Add `factions:` field to river_crossing.yaml listing `wardens_guild` —
        the unambiguous holding power of the east bank and the bridge.
      - |
        Author a distinct `warden_captain` mob file with dialogue that
        characterizes a commissioned officer: aware of what his post is for
        and what it is not for (holding the crossing, not the country), aware
        of the limits of his orders (the Wardens do not rebuild things,
        cannot move on the mill without abandoning the post), aware that the
        March's authority has been thinning in measurable ways. He should
        sound like the person who issues clear_the_mill and someone_for_the_mill,
        not interchangeable with the patrol guards.
      - |
        Update river_crossing.yaml to spawn warden_captain at warden_post
        with the existing spawn_id `warden_post_captain` instead of
        warden_guard, preserving quest wiring.
      - |
        Update clear_the_mill.yaml and someone_for_the_mill.yaml giver fields
        to reference warden_post_captain (no change needed — they already do).
        Verify quest text reads consistently with a distinct officer voice.
    lore_hooks:
      - |
        The unresolved lore-bible thread about Wardens Guild civic authority
        becomes slightly more concrete: a captain has a voice, even if the
        Guild's broader doctrine remains undefined.
      - |
        The captain knowing the limits of his post is the correct tone for the
        era — fragmented power, deliberate restraint, no faction overreaching.
    complexity: low
  - id: opp_028
    type: faction_presence
    priority: 0.77
    status: implemented
    rationale: |
      someone_for_the_mill ended with a Firdale merchant agreeing to ride out and
      look at the mill — "not a commitment, just a look." The mill has been clear
      for at least the duration of one quest arc and the merchant has not
      materialized at the river crossing in any spatial sense. The thread is the
      most clearly dangling promise in river_crossing: a faction-adjacent NPC
      committed to a journey and never made it. The lore bible records the
      unresolved status explicitly. Adding a traveling_merchant spawn at the
      west_bank (not inside the mill — the merchant looks, does not occupy)
      gives the someone_for_the_mill arc its spatial follow-through and opens
      the door for opp_029 to wire a rebuild-or-walk-away quest. Faction-wise
      this is an extension of the Firdale market faction into a contested zone:
      commerce hesitating at the edge of stability is exactly the era's tone.
    target_zone: river_crossing
    suggested_additions:
      - |
        Add a merchant spawn at west_bank (use existing merchant mob,
        count: 1, no spawn_id — distinct from the market_merchant in
        starting_village by zone alone). Place near the dock_remains if
        opp_026 lands, otherwise at the west_bank's southern edge.
      - |
        Add 3-5 merchant dialogue lines to the existing merchant.yaml
        covering: the trip out from Firdale, what the mill looks like to
        someone with capital, what would have to be true before they
        committed, the Wardens' framing of the deal, and the question of
        who else might want the site. Keep the lines short and specific;
        the merchant is a real estate scout, not a romantic.
      - |
        Do NOT spawn the merchant inside ruined_mill. The dangling thread is
        "looking, not committed" — placing them at the landing preserves
        that, and gives a future rebuild quest somewhere to move them to.
    lore_hooks:
      - |
        The lore-bible unresolved entry "Whether they follow through, whether
        a second merchant NPC appears at the mill site" gets a half-answer:
        they followed through, they have not committed.
      - |
        Commerce hesitating at the boundary of contested ground is the era's
        economic signature — the merchant's presence is itself the lore hook.
    factions:
      - 'firdale market: a merchant scout has extended the Firdale market faction into a contested zone; not Warden-affiliated, not March-aligned, just capital weighing risk'
    complexity: low
    implemented_at: '2026-06-02T04:01:24.812Z'
  - id: opp_029
    type: add_quest
    priority: 0.69
    status: pending
    rationale: |
      The warden_post_captain currently issues two quests, both about the mill.
      The Wardens' broader remit — the river itself — is unused mechanically.
      Lore offers two unfired threads: the River Riven "has been rising since
      the Sundering" (warden_guard dialogue, citizen dialogue, lore bible),
      and "the old barge lines ran all the way to the delta, once" (warden_guard
      dialogue). A Warden-issued investigation quest that sends the player to
      a barge_wreck surfaced by the rising water (depending on opp_026 landing)
      or to survey a stretch of the riverbank for what the receding/rising
      water has uncovered uses the existing zone, exercises a non-mill Warden
      hook, and adds a quest with a reach objective that does not duplicate
      the existing kill_count beats. Should be authored to land after opp_026
      so the barge_wreck is present to investigate.
    suggested_id: what_the_river_gave_up
    suggested_name: What the River Gave Up
    giver: warden_post_captain
    zone: river_crossing
    theme: pre-Sundering trade, the river's geological memory, Warden patrol duty
    stages:
      - id: start
        text: |
          Speak with the Warden captain at the east bank post. The river has
          been rising since the Sundering, and the captain says it has begun
          giving things back — wreckage the silt held for an age, surfacing
          along the west bank where the trade routes used to land.
      - id: examine_the_wreck
        text: |
          Cross to the west bank and find the barge hull the receding silt
          uncovered. The captain wants to know what era it belongs to and
          whether the cargo space is still intact enough to identify what
          it was carrying.
        objective:
          kind: reach
          template_id: barge_wreck
          zone: river_crossing
          radius: 2
      - id: clear_the_riverbank
        text: |
          Goblins have noticed the wreckage too. Clear enough of them from
          the west bank for the Wardens to send a survey party safely.
        objective:
          kind: kill_count
          template_id: goblin
          zone: river_crossing
          target: 4
      - id: report_back
        text: |
          Return to the Warden captain and report what the wreck looked like
          and what the west bank is currently safe to do.
        on_complete: done
    lore_hooks:
      - |
        The river rising "since the Sundering" gets mechanical payoff —
        the player witnesses what the rising water has uncovered without
        the world having to explain why the water is rising.
      - |
        The captain's closing beat: the Wardens know the era of the wreck.
        They will not say more about it. The barge predates them; their
        knowing means someone in the Guild has been here longer than the
        current post, which the lore bible has not yet been asked to confirm.
      - |
        Dependency: opp_026 must land first to spawn the barge_wreck entity
        the reach objective targets. If opp_026 is deferred, retarget the
        reach to a fixed-coordinate point on the west bank near the landing.
    rewards:
      - gold: 55
    complexity: medium
  - id: opp_030
    type: refactor_lore
    priority: 0.48
    status: pending
    rationale: |
      The river_crossing zones[] summary in the lore bible reads "The east bank
      holders cannot dislodge them without outside help" — accurate at zone
      creation, now stale: clear_the_mill has been implemented and the goblins
      are mechanically clearable. The summary also says the merchant has
      "expressed interest in the cleared mill" as an unresolved thread, which
      remains correct. The contradiction is narrow but real: the zone summary
      treats the mill as still goblin-held while two subsequent unresolved
      entries treat it as cleared. This is a lore-bible hygiene flag, not a
      worldbuilding gap — best resolved by reframing the zone summary to
      describe the crossing as it stands after the first quest arc, leaving
      the unresolved threads (rebuild, merchant commitment, civic authority)
      intact in the unresolved section where they belong.
    target: bible.zones[id=river_crossing].summary
    contradiction: |
      Zone summary describes the mill as goblin-held and the east bank as
      unable to dislodge them. Unresolved-section entries describe the mill
      as cleared and the merchant interest as post-clearance. The two
      states cannot both be canonical at the same point in time.
    resolution: |
      Rewrite the zone summary to reflect post-clear_the_mill state: the
      mill is cleared, structurally sound, unoccupied, the Wardens still
      hold the east bank, the west bank is contested by intermittent goblin
      pressure rather than by a settled lair. Leave the unresolved entries
      about rebuild, merchant commitment, and Warden civic authority
      unchanged — those remain open.
    complexity: low
