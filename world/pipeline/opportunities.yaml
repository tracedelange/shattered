world_summary: |
  The world has five implemented zones in healthy structural shape: starting_village
  functions as a proper settlement, the tavern is a coherent interior, and the sewers
  deliver atmospheric depth beneath the village. Three named narrative gaps remain
  actionable — the dark_forest hollow promises something ancient but delivers nothing,
  the river_crossing has a stated conflict (goblins in the mill, Wardens unable to
  dislodge them) with no quest, and the village_sewers' Gardener anomaly awaits
  activation. The March is invoked by name in seven NPC dialogue lines across three
  zones but has no physical representative anywhere in the world — the most conspicuous
  faction-absence in the current graph. The lore bible's southern grasslands are the
  only named geography with zero zone representation.
