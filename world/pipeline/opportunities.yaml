      corridors, damp stone, occasional open cistern chambers.

      Three spatial tiers from entry to boss:
        Tier 1 (near portal): wide entry tunnel, shallow water, rat nests.
        Tier 2 (mid-zone): collapsed side passages, darker, giant rat dens.
        Tier 3 (cistern chamber): large round room, the Rat King's lair.

      Stamp a sewer_grate prefab (iron grate over a descending ladder) in the
      village square of village_41_41 as the portal anchor. The portal descends
      into zone_41_41_sewer.

      A return portal (iron ladder climbing up) sits near the entry of the sewer.
      The boss room is a dead end — no exit except back through the zone.
