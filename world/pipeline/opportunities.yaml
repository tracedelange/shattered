  - id: opp_058
    type: add_quest
    priority: 0.52
    status: pending
    rationale: |
      The March has received three deliverables tied to the Goblin Hold:
      into_the_hold's scout report, the_warlords_end kill confirmation, and
      the_holds_account dungeon count. The herald in the village has absorbed
      all three without a visible response. The march_scout at goblin_castle
      approach has been holding position with no new orders. A quest that
      delivers sealed orders from the herald to the scout advances the March
      faction arc without resolving what the orders contain. The survey beat
      (walking the outer ward perimeter) confirms the Hold remains passable
      and gives the March its first active territorial gesture. No new zones
      or entities required.
    suggested_id: a_forward_position
    suggested_name: A Forward Position
    giver: herald_post_herald
    giver_zone: starting_village
    unlock_after: the_holds_account
    suggested_stages:
      - |
        start: The herald has sealed orders for the scout at the Hold. He
        does not name what they contain. He asks the player to deliver them.
        The delivery route through the forest is not new ground for someone
        who has already been to the dungeon and back. Talk-to-giver stage.
      - |
        deliver_orders: Travel to goblin_castle and deliver the sealed orders
        to the march_scout. Objective kind: talk, target_template: march_scout.
        The scout receives the orders without surprise. Their closing registers
        the change without naming it: "I have orders now. That is different
        from before."
      - |
        survey_the_approach: The orders include a survey requirement. Confirm
        the outer ward is still passable for a forward party. Objective kind:
        reach, zone: goblin_castle, x: 35, y: 27, radius: 6. The outer_ward
        goblins are still present; the player passes through them as evidence
        the ground is contested but not closed.
      - |
        report_back: Return to the herald with confirmation. Talk-to-giver
        stage. The herald's closing matches his established register: "The
        March acknowledges the service. As always." He does not say what the
        orders contained or what happens next. Nothing in the world visibly
        changes. Something has changed.
    rewards:
      - xp: 95
      - gold: 55
    lore_hooks:
      - |
        The scout's line "I have orders now. That is different from before"
        is the only visible marker that the March has moved. What the orders
        say, whether a garrison follows, and whether the March's claim becomes
        a physical presence at the Hold is unresolved. Define only when a
        March faction arc demands a specific answer about the Hold's disposition.
      - |
        The herald's unbroken register is the correct closing. The March
        does not announce itself. It acts, and the acknowledgment is the
        same as always.
    complexity: low
