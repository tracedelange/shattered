    suggested_name: Tanglewood
    theme: Dense second-growth forest. Old camp-fires still smolder. The goblins have been here a while.
    suggested_archetype: crucible
    lore_hooks:
      - Goblin totems mark the tree-line. They were not here last season.
      - A farmer went missing on the road through here. His cart is still upright.
      - Something larger than goblins left tracks near the old hollow.
