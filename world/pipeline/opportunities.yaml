  - id: opp_050
    type: add_quest
    priority: 0.72
    status: implemented
    rationale: |
      The guard_captain's missing scout is the strongest open thread in the
      barracks content and gives firdale_barracks its first quest anchor.
      Scouts_dont_come_back_clean already covers the hollow and ruin_threshold
      in dark_forest. This quest presses further north to the_old_stones,
      where the trail ends without a body. The prisoner's dialogue resonates
      differently after the player returns with no answer. No new zones or
      entities required.
    suggested_id: where_the_road_ends
    suggested_name: Where the Road Ends
    giver: firdale_guard_captain
    giver_zone: firdale_barracks
    unlock_after: scouts_dont_come_back_clean
    suggested_stages:
      - |
        start: The captain explains that a scout was sent north past the hollow.
        Did not come back. The captain will not send another guard. An outsider
        who survived the hollow is the next option. Talk-to-giver stage.
      - |
        trace_north: Press north past the ruin_threshold into the_old_stones.
        Objective kind: reach, template_id: hollow_watcher, zone: the_old_stones,
        radius: 8. The courtyard hollow_watcher spawns will trigger this once
        the player enters the cleared precinct. The stage text should note the
        tree line stops at the courtyard edge without cause — the captain's scout
        would have noted the same.
      - |
        reach_sanctum: The hermit may know what came north from the forest.
        Press to the innermost room. Objective kind: reach, zone: the_old_stones,
        x: 27, y: 6, radius: 4. This is the inner_sanctum coordinate established
        by the_same_measure and the_keepers_circuit. The hollow_watcher in the
        sanctum is the deepest point the player can reach.
      - |
        report_back: Return to the captain. Talk-to-giver stage. The captain
        receives a report that confirms nothing. No body. No scout. No answer.
        The prisoner remains in the cell; the quest does not connect them.
    rewards:
      - xp: 110
      - gold: 60
    lore_hooks:
      - |
        The captain's closing line should stay in their established register:
        "No body. That is not relief." Then silence. No connection to the cell
        is named.
      - |
        The hermit's existing opening line ("You came from the south. Through
        the hollow.") is already the correct response to a player arriving from
        dark_forest. No dialogue changes required.
      - |
        The prisoner's line ("Some went north and did not come back. Some came
        back. I won't say which I am.") lands differently after this quest.
        Neither the quest nor any NPC states the connection. The player draws
        their own conclusion.
    complexity: low
