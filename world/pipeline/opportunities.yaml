generated_at: '2026-06-03T00:00:00Z'
world_summary: |
  The zone graph is coherent but weighted north-south: the Gardener-mystery arc
  (village_sewers to the_old_stones) is the deepest narrative spine, while the March
  faction has no military endpoint. Its herald issues goblin-thinning quests but the
  goblin threat has no home base the player can assault. River_crossing is structurally
  complete after opp_026 and opp_028; warden_captain distinction (opp_027), the river
  investigation quest (opp_029), and the lore bible cleanup (opp_030) remain pending.
  The goblins' presence across four zones without a source zone is the sharpest
  narrative gap: a goblin stronghold east of the dark_forest lair gives the March a
  credible military objective and closes the warband-origin thread.
opportunities:
  - id: opp_026
    type: deepen_zone
    priority: 0.74
    status: implemented
    rationale: |
      River_crossing lore explicitly names "dock wreckage" and "the stub of a dock"
      but the implementation only scatters stone_floor noise across the west_bank.
      The pre-Sundering industrial scene has no spatial substance. Adding concrete
      structures gives someone_for_the_mill and any future rebuild arc something
      to anchor against, and converts the lore-hook from dialogue ornament into
      explorable space.
    target_zone: river_crossing
    complexity: medium
    implemented_at: '2026-06-03T04:32:45.242Z'
  - id: opp_027
    type: faction_presence
    priority: 0.71
    status: pending
    rationale: |
      The river_crossing YAML carries no factions field, the only overworld zone
      besides dark_forest to lack one. The Wardens Guild is the unambiguous holding
      power here yet they are not declared at the zone level. Separately, the
      warden_post_captain reuses the generic warden_guard mob with shared dialogue:
      the only named-by-spawn-id officer in the zone has no distinct voice.
    target_zone: river_crossing
    suggested_additions:
      - |
        Add `factions:` field to river_crossing.yaml listing `wardens_guild` —
        the unambiguous holding power of the east bank and the bridge.
      - |
        Author a distinct `warden_captain` mob file with dialogue that
        characterizes a commissioned officer: aware of what his post is for
        and what it is not for (holding the crossing, not the country), aware
        of the limits of his orders (the Wardens do not rebuild things), aware
        that the March's authority has been thinning in measurable ways.
      - |
        Update river_crossing.yaml to spawn warden_captain at warden_post
        with the existing spawn_id `warden_post_captain` instead of
        warden_guard, preserving quest wiring.
    lore_hooks:
      - |
        The unresolved lore-bible thread about Wardens Guild civic authority
        becomes slightly more concrete: a captain has a voice, even if the
        Guild's broader doctrine remains undefined.
      - |
        The captain knowing the limits of his post is the correct tone for the
        era — fragmented power, deliberate restraint, no faction overreaching.
    complexity: low
  - id: opp_028
    type: faction_presence
    priority: 0.77
    status: implemented
    rationale: |
      someone_for_the_mill ended with a Firdale merchant agreeing to ride out and
      look at the mill. The thread is the most clearly dangling promise in
      river_crossing. Adding a merchant spawn at the west_bank gives the arc
      its spatial follow-through and opens the door for opp_029.
    target_zone: river_crossing
    complexity: low
    implemented_at: '2026-06-02T04:01:24.812Z'
  - id: opp_029
    type: add_quest
    priority: 0.69
    status: pending
    rationale: |
      The warden_post_captain currently issues two quests, both about the mill.
      The Wardens' broader remit — the river itself — is unused mechanically.
      The River Riven "has been rising since the Sundering" is an unfired thread
      in both warden_guard dialogue and the lore bible. A reach-objective quest
      toward the barge_wreck uses the existing zone without duplicating the
      existing kill_count beats.
    suggested_id: what_the_river_gave_up
    suggested_name: What the River Gave Up
    giver: warden_post_captain
    zone: river_crossing
    theme: pre-Sundering trade, the river's geological memory, Warden patrol duty
    stages:
      - id: start
        text: |
          Speak with the Warden captain at the east bank post. The river has
          been rising since the Sundering, and the captain says it has begun
          giving things back — wreckage the silt held for an age, surfacing
          along the west bank where the trade routes used to land.
      - id: examine_the_wreck
        text: |
          Cross to the west bank and find the barge hull the receding silt
          uncovered. The captain wants to know what era it belongs to and
          whether the cargo space is still intact enough to identify what
          it was carrying.
        objective:
          kind: reach
          template_id: barge_wreck
          zone: river_crossing
          radius: 2
      - id: clear_the_riverbank
        text: |
          Goblins have noticed the wreckage too. Clear enough of them from
          the west bank for the Wardens to send a survey party safely.
        objective:
          kind: kill_count
          template_id: goblin
          zone: river_crossing
          target: 4
      - id: report_back
        text: |
          Return to the Warden captain and report what the wreck looked like
          and what the west bank is currently safe to do.
        on_complete: done
    lore_hooks:
      - |
        The river rising "since the Sundering" gets mechanical payoff —
        the player witnesses what the rising water has uncovered without
        the world having to explain why the water is rising.
      - |
        Dependency: opp_026 must land first to spawn the barge_wreck entity
        the reach objective targets.
    rewards:
      - gold: 55
    complexity: medium
  - id: opp_030
    type: refactor_lore
    priority: 0.48
    status: pending
    rationale: |
      The river_crossing zones[] summary in the lore bible reads "The east bank
      holders cannot dislodge them without outside help" — accurate at zone
      creation, now stale: clear_the_mill has been implemented. The contradiction
      is narrow but real: the zone summary treats the mill as still goblin-held
      while two subsequent unresolved entries treat it as cleared.
    target: bible.zones[id=river_crossing].summary
    contradiction: |
      Zone summary describes the mill as goblin-held and the east bank as
      unable to dislodge them. Unresolved-section entries describe the mill
      as cleared and the merchant interest as post-clearance. The two
      states cannot both be canonical at the same point in time.
    resolution: |
      Rewrite the zone summary to reflect post-clear_the_mill state: the
      mill is cleared, structurally sound, unoccupied, the Wardens still
      hold the east bank, the west bank is contested by intermittent goblin
      pressure rather than by a settled lair. Leave the unresolved entries
      about rebuild, merchant commitment, and Warden civic authority
      unchanged — those remain open.
    complexity: low
  - id: opp_031
    type: new_zone
    priority: 0.73
    status: pending
    rationale: |
      Goblins appear in dark_forest, river_crossing, and southern_ruins but
      have no origin zone. The March herald thins the pressure without resolving
      it; the lore unresolved thread mentions "whether the warband fractures or
      reorganizes under a successor" but the warband has nowhere to be. A goblin
      stronghold east of the dark_forest goblin_lair gives the March a credible
      military objective and gives the two existing goblin quest arcs a natural
      escalation endpoint.
    connection:
      zone: dark_forest
      direction: east
    suggested_id: goblin_castle
    suggested_name: The Goblin Hold
    theme: fortified goblin stronghold, hobgoblin leadership, March military interest
    factions:
      - goblin_warband
    lore_hooks:
      - |
        The goblin_lair in dark_forest is a camp; the castle is where the
        warband actually lives. The March knows both exist; it has been
        ignoring the castle because the road was enough. The road is no
        longer enough.
      - |
        Hobgoblins are larger and more organized than the goblins at the
        camp. The warlord (Grundar) holds authority through force, not title.
        He is not interested in the village — the village is not worth the
        effort. The March is.
      - |
        The standing stone at the dark_forest hollow is not visible from
        the castle. The warlord has no interest in the hollow or anything
        pre-Shattering. His world is tactical, not historical.
    suggested_additions:
      - |
        Regions: gatehouse (entry, rect w:10 h:8), outer_wall (contested
        perimeter, stone_floor with heavy wall scatter), keep_hall (interior
        fighting space, rect w:14 h:10), throne_room (boss room, rect w:8 h:8).
      - |
        Spawn hobgoblins in outer_wall and keep_hall; hobgoblin_warlord
        (Grundar) in throne_room as count:1 with no respawn (boss).
      - |
        Connect east of dark_forest goblin_lair — the dirt track from the
        clearing eastward continues beyond the lair boundary.
    complexity: high
