    suggested_id: into_the_hold
    suggested_name: Into the Hold
    giver: herald_post_herald
    zone: starting_village
    unlock_after: the_march_takes_note
    theme: reconnaissance of goblin_castle, March intelligence work
    stages:
      - id: start
        text: |
