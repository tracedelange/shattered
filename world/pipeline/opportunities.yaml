world_summary: |
  The world has zero implemented zones despite the lore bible recording Firdale
  as implemented. Metrics are ground truth: the world is empty. Bootstrap
  exception applies — foundational zones must be established before depth rules
  dominate. The lore bible gives clear starting material: a provincial village
  on an old road, goblins pressing from the north and west, and a guardhouse
  watching that frontier. Two or three zones should be planted and given basic
  content before any further expansion.
