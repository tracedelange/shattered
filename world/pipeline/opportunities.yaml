    type: refactor_zone
    priority: 0.42
    status: pending
    rationale: |
      starting_village is the only zone flagged by signals.no_lore_hook_zones.
      It has 12 regions and carries more player traffic than any other zone,
      but none of its region ops carry lore hook comments. Dark_forest,
      river_crossing, and the_old_stones all have per-region comments tying
      the space to the world's history. starting_village should have the same
      anchoring, especially for regions like the fountain (predates the
      village, never run dry), the sewer_grate (access to pre-Shattering
      drainage), and the herald_post (the March's physical presence in Firdale).
    target_zone: starting_village
    suggested_additions:
      - 'Add a lore hook comment to the town_square region: the fountain at its center predates the current structure by an uncertain age and has not run dry in recorded memory — the only public anomaly in the village that nobody questions'
      - 'Add a lore hook comment to the sewer_grate region: direct access to the pre-Shattering drainage system beneath the village; the grate east of the inn is the only surviving surface entry'
      - 'Add a lore hook comment to the herald_post region: the March has a physical position in Firdale now; a herald who stays longer than a courtesy visit requires is presence, not protocol'
      - 'Add a lore hook comment to the guardhouse region: the watch answers to the village, not the March — the guardhouse is the spatial expression of that distinction; the barracks inside is its interior'
      - Add lore hook comments to the bazaar_court, inn, and guard_tower regions noting the economic contraction (slow market, traders kept away by road pressure) and the north watch posture
    lore_hooks:
      - |
        The fountain comment should reference the lore bible fact directly:
        "Has not run dry in recorded memory. Older than the village, some say."
        The citizen dialogue already carries this line; the zone op comment
        gives it architectural weight.
      - |
        The herald_post comment should not editorialize on March intent.
        State only: the herald is here, the post is here, the duration is
