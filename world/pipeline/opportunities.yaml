world_summary: |
  Six quests are live with wired objectives. All five overworld zones have faction
  representation except village_sewers, which carries an explicit factions: [] gap —
  the only implemented zone without a human-scale faction presence. Southern_ruins
  launched with ruin_scavengers present but no activating quest; their three-season
  residency and loaded dialogue is the clearest unfired narrative seed in the world.
  Dark_forest has sufficient depth (five sub-regions, two active quests) to support a
  child zone when lower-priority content is satisfied first.
opportunities:
  - id: opp_021
    type: add_quest
    priority: 0.82
    status: implemented
    rationale: |
      The ruin_scavengers in southern_ruins have three seasons of loaded dialogue but
      no activating quest — the faction presence is inert. Their lines telegraph a
      specific gap: they are looking for something they will not name, avoiding
      undisturbed stone for reasons they will not explain, and goblins are blocking
      ground they want to dig. A quest that clears contested ground and surveys the
      east mound gives the scavengers their first mechanical purpose and opens the
      thread about what they are actually searching for without resolving it.
    suggested_id: three_seasons_nothing
    suggested_name: Three Seasons Nothing
    giver: ruin_scavenger
    zone: southern_ruins
    theme: ruins investigation, pre-Shattering archaeology, contested excavation
    stages:
      - id: start
        text: |
          Talk to one of the ruin scavengers at the camp south of the central ruin.
          Three seasons. Nothing worth naming. They are willing to admit, without
          naming it, that fresh eyes might see something they have been avoiding.
      - id: survey_east_mound
        text: |
          The scavengers have not touched the east mound — something about the
          undisturbed stone makes them uneasy. Survey it yourself.
        objective:
          kind: reach
          zone: southern_ruins
          x: 54
          'y': 29
          radius: 6
      - id: clear_west_threshold
        text: |
          Goblins hold the west corner. The scavengers cannot dig there while
          they occupy it. Drive them out — not permanently, just enough to work.
        objective:
          kind: kill_count
          template_id: goblin
          zone: southern_ruins
          target: 5
      - id: report_back
        text: |
          Return to the scavenger camp and report what you found — and what you
          could not find. The scavenger will listen without relief.
    lore_hooks:
      - |
        The scavengers already say: "I don't dig where the stone's undisturbed.
        Something about those spots doesn't sit right" — the quest surfaces this
        without explaining it
      - The east mound is the most eroded site; nothing obviously there, which is exactly what troubles them
      - 'Closing beat: the scavenger does not explain what they are looking for — the player has cleared ground they could not clear, and that is all'
    rewards:
      - gold: 60
    complexity: low
    implemented_at: '2026-05-31T16:57:19.172Z'
  - id: opp_022
    type: faction_presence
    priority: 0.72
    status: implemented
    rationale: |
      Village_sewers carries an explicit factions: [] entry — the only implemented
      zone without a faction presence, a direct coherence flag. The Gardener-anomaly
      sealed room is the most significant unresolved lore element in the current world,
      and the zone needs a human-scale presence to anchor a future Gardener-cult arc.
      A scholar or hermit who has descended through the grate and taken up in the
      masonry_hall — documenting the sealed room without being able to explain it —
      gives the sewers the correct tone: the anomaly is observable, not yet understood.
    target_zone: village_sewers
    suggested_additions:
      - |
        Add a ruins_scholar entity (idle, aggro_range 0) spawned in masonry_hall;
        dialogue focused on the dais in the sealed room — its dimensions, its
        waterlines, the fact that it appears grown rather than built
      - |
        Do not resolve the Gardener or Shard god question in this entity's dialogue —
        the scholar should have careful observations and careful silence, not answers
      - |
        The scholar's presence implies someone else already knows about the sealed room,
        raising the question of who sent them or whether they came alone
    lore_hooks:
      - |
        The barkeep says "Found it, did you. Good. Now you know as much as I do" —
        a scholar in the masonry_hall quietly contradicts that claim
      - The scholar as independent faction presence fits the era of fragmented power — no organization officially claims these ruins
    factions:
      - 'ruins_scholar: independent — not March-aligned, not Warden-affiliated; analogous to the ruin_scavengers in southern_ruins'
    complexity: low
    implemented_at: '2026-05-31T16:58:16.699Z'
  - id: opp_023
    type: deepen_zone
    priority: 0.67
    status: implemented
    rationale: |
      Southern_ruins launched with five sub-regions and adequate spawns but no
      interactable markers or physical evidence of the lore-bible claim that the
      masonry echoes the sewer work beneath Firdale. The zone is wide and rewards
      nothing for thorough exploration beyond combat. Adding one or two concrete
      elements to the central_ruin — a carved fragment, a dry cistern stub — creates
      spatial evidence for the cross-zone lore thread and gives opp_021 and any future
      ruins arc something to anchor against.
    target_zone: southern_ruins
    suggested_additions:
      - |
        Add a carved_stone entity (idle, no aggro) inside the central_ruin — a fragment
        of wall-face with markings in no surviving language, similar in character to the
        standing stone in dark_forest but more eroded; this would be the second instance
        of unreadable script in the world
      - |
        Add a dry_well region (circle r: 2, stone_floor) inside or immediately adjacent
        to the central_ruin — a cistern stub that mirrors the flooded cistern in
        village_sewers, suggesting the same drainage tradition; dry, not flooded
      - |
        Extend the stone_floor noise_patch beyond the central_ruin boundary to suggest
        the original settlement footprint — the scavenger line "foundations under the
        grass, you can feel them through your boots when the ground's dry" should be
        spatial, not just dialogue
    lore_hooks:
      - A dry cistern echo completes the lore-bible claim about shared masonry tradition without asserting a causal link
      - The carved stone fragment is a second data point alongside the dark_forest standing stone — same tradition, different site, no named builder at either
    complexity: medium
    implemented_at: '2026-05-31T17:00:45.255Z'
  - id: opp_024
    type: add_quest
    priority: 0.64
    status: implemented
    rationale: |
      The lore bible explicitly flags the tavern back room's ledgers as unresolved:
      "what they record, whether the barkeep knows their contents, and who else might
      want them is unresolved — define only when a specific quest demands a specific
      answer." The barkeep's completion line for beneath_the_square implies he has been
      waiting for someone who has now demonstrated competence underground. A second
      barkeep quest that sends the player to examine a specific ledger entry — not to
      find an answer, but to confirm the question — activates the back room as a
      narrative space and creates the first cross-zone lore thread connecting the tavern
      to the pre-Shattering settlement beneath the village. Should be gated after
      beneath_the_square in practice; the barkeep will not raise it with strangers.
    suggested_id: what_the_ledger_says
    suggested_name: What the Ledger Says
    giver: barkeep
    zone: tavern
    theme: pre-Shattering history, Gardener anomaly, barkeep characterization
    stages:
      - id: start
        text: |
          The barkeep mentions, without emphasis, that there is something in the back
          room the player should look at. Not an order. A suggestion. He will not
          explain why now is the time.
      - id: examine_ledger
        text: |
          Go into the back room behind the bar. The ledger on the shelf nearest the
          wall is older than the building. It is open to a page of water measurements
          taken at a location the notation does not name. The dates are wrong by at
          least one age. Get close enough to read what you can.
        objective:
          kind: reach
          zone: tavern
          x: 16
          'y': 6
          radius: 3
      - id: report_back
        text: Return to the barkeep with what the ledger says.
    lore_hooks:
      - |
        The ledger entry should be specific but unresolvable: a series of water
        measurements, a location without a name, dates that predate Firdale — players
        who have done beneath_the_square will recognize the cistern dimensions
      - |
        The barkeep's response demands his full character: he already knew, he wanted
        the player to know too, he will not say why and will not say more
    rewards:
      - gold: 40
    complexity: low
    implemented_at: '2026-05-31T17:01:59.467Z'
  - id: opp_025
    type: new_zone
    priority: 0.51
    status: implemented
    rationale: |
      The dark_forest ruin_threshold is the world's strongest undeveloped lore hook —
      cut angles and jointing belonging to no named kingdom, described as older than any
      road builder. The hollow_watcher, the standing stone, and the threshold together
      imply something significant once occupied the forest's northern reach. Dark_forest
      has five sub-regions and two active quests; it satisfies depth-before-breadth.
      A zone north of dark_forest — a partially intact ruin complex, not merely a
      threshold fragment — would give the ancient-presence thread a physical space and
      open the world's first Gardener-touched or Shard god candidate site. Score is held
      low because opp_022 and opp_023 should close first, and because a zone at this
      lore depth demands deliberate faction assignment before implementation — a
      factionless zone here would be a coherence failure given the lore weight.
    connection:
      zone: dark_forest
      direction: north
    suggested_id: the_old_stones
    suggested_name: The Old Stones
    theme: ancient ruin complex, pre-Shattering presence, Gardener anomaly or Shard god candidate site
    lore_hooks:
      - 'No named builder — the correct form for a Gardener anomaly: found, not made'
      - The hollow_watcher may originate here or be drawn to the proximity of this site
      - The standing stone script and the ruin_threshold masonry share a tradition with no surviving name; this zone would be its source
    factions:
      - |
        None assigned yet — must be assigned before implementation; candidates are a
        Shard god cult, a Gardener-touched hermit, or independent scholars; do not
        implement factionless
    complexity: high
    implemented_at: '2026-05-31T17:08:58.061Z'
