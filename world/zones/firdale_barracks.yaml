id: firdale_barracks
name: The Firdale Barracks
tileset: overworld
width: 34
height: 30
default_tile: void
spawn_point:
  region: muster_hall
ops:
  # Lore hook: the barracks shell — civic militia space, not March garrison.
  # The building answers to the village; its walls keep that distinction clear.
  - type: region
    id: building
    shape:
      kind: rect
      w: 26
      h: 24
    at:
      x: 4
      'y': 3
    floor: wood_floor
    walls:
      tile: wall
      door:
        side: south
        tile: door

  # Lore hook: the sealed cell — one prisoner, three live readings.
  # Missing northern scout, a March matter taken in quietly, or someone
  # the watch simply will not release. None resolved here.
  # 16 inaccessible tiles are the sealed cell interior — correct behavior;
  # the prisoner is visible through the bars but unreachable.
  - type: region
    id: cell
    shape:
      kind: rect
      w: 8
      h: 2
    at:
      x: 11
      'y': 4
    floor: stone_floor

  - type: fill
    bounds:
      rect:
        x: 10
        'y': 4
        w: 1
        h: 2
    tile: wall

  - type: fill
    bounds:
      rect:
        x: 19
        'y': 4
        w: 1
        h: 2
    tile: wall

  # Cell south face — cell_bars so the prisoner is visible from the muster_hall
  # approach while the cell stays sealed. 16 inaccessible tiles are the sealed
  # cell interior — correct behavior; the prisoner is visible through the bars
  # but unreachable.
  - type: fill
    bounds:
      rect:
        x: 10
        'y': 6
        w: 10
        h: 1
    tile: cell_bars

  # Lore hook: the captain's office — commands the watch, answers to the village.
  # Who holds civic authority above this post in Firdale is unresolved
  # and not defined in this zone.
  - type: region
    id: captain_office
    shape:
      kind: rect
      w: 7
      h: 6
    at:
      x: 5
      'y': 9
    floor: stone_floor
    walls:
      tile: wall
      door:
        side: east
        tile: door

  # Lore hook: the bunk room — guards off duty, weapons racked, not relaxed.
  # A militia that drills every morning sleeps close to its post.
  - type: region
    id: bunk_room
    shape:
      kind: rect
      w: 7
      h: 7
    at:
      x: 22
      'y': 9
    floor: wood_floor
    walls:
      tile: wall
      door:
        side: west
        tile: door

  # Lore hook: the muster hall — where the watch drills, reports, and reads orders.
  # The village_board here is the first militia-affiliated notice board in the world;
  # patrol notices give the militia a written voice independent of NPC dialogue.
  - type: region
    id: muster_hall
    shape:
      kind: rect
      w: 7
      h: 14
    at:
      x: 12
      'y': 8
    floor: wood_floor

  - type: scatter
    bounds:
      region: muster_hall
    tile: stone_floor
    count: 6
    seed: barracks_drill_rack_v1
    over: wood_floor

  - type: noise_patch
    bounds:
      region: muster_hall
    over: wood_floor
    tile: dirt
    threshold: 0.85
    scale: 1.5
    seed: barracks_wear_v1

spawns:
  # The watch drilling in the muster hall — the militia is real and staffed.
  - entity: village_guard
    region: muster_hall
    count: 2
    respawn_seconds: 60

  # The captain — commands the watch, answers to the village. No respawn.
  - entity: guard_captain
    region: captain_office
    count: 1
    spawn_id: firdale_guard_captain

  # One guard off-duty in the bunks.
  - entity: village_guard
    region: bunk_room
    count: 1
    respawn_seconds: 60

  # The prisoner — sealed in the cell, visible through the bars, unreachable.
  # Static; no respawn.
  - entity: prisoner
    region: cell
    count: 1

  # Militia notice board — drill schedules, north road patrol rotation,
  # and a notice about scouts not returning on time.
  - entity: village_board
    region: muster_hall
    board_id: firdale_militia_board

  - entity: torch
    at:
      x: 11
      'y': 7
  - entity: torch
    at:
      x: 18
      'y': 7
  - entity: torch
    at:
      x: 23
      'y': 11
  - entity: torch
    at:
      x: 21
      'y': 11
  - entity: torch
    at:
      x: 18
      'y': 25
  - entity: torch
    at:
      x: 16
      'y': 25
  - entity: torch
    at:
      x: 12
      'y': 13
  - entity: torch
    at:
      x: 10
      'y': 13

portals:
  - at:
      x: 17
      'y': 26
    to:
      zone: starting_village
      x: 12
      'y': 21
