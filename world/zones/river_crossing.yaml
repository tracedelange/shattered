id: river_crossing
name: The River Crossing
tileset: overworld

width: 60
height: 50
default_tile: grass

spawn_point: { region: west_bank }

factions:
  - wardens_guild

ops:
  # Lore hook: The River Riven once powered mills and barges along this bank —
  # the overgrowth reclaiming the margins is a generation of post-Sundering neglect.

  # Sparse brush across the zone — river margins are overgrown and wild.
  - type: noise_patch
    bounds: { all: true }
    over: grass
    tile: wall
    threshold: 0.76
    scale: 2.7
    seed: crossing_brush_v1

  # West bank clearing — where travelers arrive from the village road.
  - type: region
    id: west_bank
    shape: { kind: circle, r: 7 }
    at: { x: 12, y: 25 }
    floor: grass

  # Ruined mill north of the landing — pre-Sundering industry, now goblin shelter.
  - type: region
    id: ruined_mill
    shape: { kind: rect, w: 10, h: 8 }
    at: { relative_to: west_bank, side: north, gap: 2 }
    floor: stone_floor
    walls:
      tile: wall
      door: { side: south, tile: door }

  # Break up the mill floor — collapsed sections and years of neglect.
  - type: noise_patch
    bounds: { region: ruined_mill }
    over: stone_floor
    tile: dirt
    threshold: 0.44
    scale: 2.1
    seed: crossing_mill_decay_v1

  # Millrace stub — the dry tailrace channel that once carried spent water from the
  # mill wheel back to the river margin. No surviving sluice gate; the upper head is
  # silted over. The channel exits the mill's south face and runs toward the dock landing.
  # Lore hook: the means of production survive intact — wheel housing, millrace, dock —
  # everything needed to resume work except the decision to do it. The Sundering's damage
  # is visible in what stands idle, not in what was destroyed.
  - type: region
    id: millrace_stub
    shape: { kind: rect, w: 3, h: 8 }
    at: { relative_to: ruined_mill, side: south, gap: 0 }
    floor: dirt

  # East bank — Wardens Guild-controlled side of the crossing.
  - type: region
    id: east_bank
    shape: { kind: circle, r: 6 }
    at: { relative_to: west_bank, side: east, gap: 16 }
    floor: grass

  # Dock remains — stone footprint of the old barge landing, low and partial.
  # Absolute coords used: relative_to west_bank side:east overshoots into the
  # channel. This placement straddles the river's western margin — the landward
  # half stays dry, the outward face is submerged when the river path is drawn
  # over it in the next op.
  # Lore hook: the barge_wreck alongside gives the warden_guard's line a spatial
  # referent — "the old barge lines ran all the way to the delta" is visible here,
  # not only spoken.
  - type: region
    id: dock_remains
    shape: { kind: rect, w: 6, h: 3 }
    at: { x: 24, y: 33 }
    floor: stone_floor

  # The River Riven — wide, slow, and impassable without the bridge.
  # Drawn after dock_remains so the river's western edge submerges the dock face.
  - type: path
    points:
      - { edge: north, t: 0.47 }
      - { edge: south, t: 0.5 }
    tile: water
    width: 5
    jitter: 1.5
    seed: crossing_river_v1

  # Warden post: small fortified building north of the east bank.
  # Lore hook: Wardens Guild claims authority over waterways — a guard post is canonical.
  - type: region
    id: warden_post
    shape: { kind: rect, w: 8, h: 6 }
    at: { relative_to: east_bank, side: north, gap: 2 }
    floor: wood_floor
    walls:
      tile: wall
      door: { side: south, tile: door }

  # Weathered planking and dock hardware — debris confined to the landing footprint.
  # dirt over stone_floor gives the dock surface rot and long-abandonment texture.
  # Lore hook: barge lines ran from here before the Sundering ended river trade.
  - type: noise_patch
    bounds: { region: dock_remains }
    over: stone_floor
    tile: dirt
    threshold: 0.62
    scale: 1.7
    seed: crossing_dock_debris_v1

  # Stone bridge spanning the river — cracked but passable, the only safe crossing.
  - type: road
    from: { region: west_bank,  anchor: east }
    to:   { region: east_bank,  anchor: west }
    tile: stone_floor
    width: 2

  # Dirt track from west bank up to the ruined mill.
  - type: road
    from: { region: west_bank,   anchor: north }
    to:   { region: ruined_mill, anchor: south }
    tile: dirt

  # Dirt track from east bank up to the warden post.
  - type: road
    from: { region: east_bank,   anchor: north }
    to:   { region: warden_post, anchor: south }
    tile: dirt

spawns:
  # Wardens hold the east bank and staff their post — they claim the crossing, not the west.
  - entity: warden_guard
    region: east_bank
    count: 2
    respawn_seconds: 60
  # The captain has a distinct voice: knows the post's remit and its limits.
  - entity: warden_captain
    region: warden_post
    count: 1
    spawn_id: warden_post_captain
    respawn_seconds: 60
  - entity: warden_guard
    region: warden_post
    count: 1
    respawn_seconds: 60
  # Goblins have taken the ruined mill and spilled onto the west bank — contested crossing.
  - entity: goblin
    region: west_bank
    count: 2
    respawn_seconds: 60
  - entity: goblin
    region: ruined_mill
    count: 3
    respawn_seconds: 90
  # Barge wreck at the dock remains — the hull that stayed when the trade left.
  # Static discovery; no respawn. Gives warden_guard dialogue a visible referent.
  - entity: barge_wreck
    region: dock_remains
    count: 1
  # Lore hook: a Firdale merchant rode out to look at the mill after someone_for_the_mill —
  # made the trip, has not committed. Stands at the landing, not inside the structure.
  # Commerce hesitating at the boundary of contested ground is the era's economic signature.
  - entity: merchant
    region: west_bank
    count: 1
    spawn_id: river_merchant

connections:
  west: starting_village
