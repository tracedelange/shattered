id: southern_ruins
name: The Ruined Grasslands
tileset: overworld

width: 70
height: 60
default_tile: grass

spawn_point: { region: north_road_entry }

ops:
  # Lore hook: the ruins have no name and no maker's mark. The cut angles and
  # tolerances echo the pre-Shattering sewer masonry beneath Firdale — same era,
  # plainly not the same hand or purpose. Ruin scavengers have been at it three
  # seasons and found nothing definitive. The grassland is wide and exposed;
  # danger comes from distance, not enclosure.

  # Sparse brush and long grass across the open zone — post-Sundering regrowth
  # reclaiming whatever settlement was here before.
  - type: noise_patch
    bounds: { all: true }
    over: grass
    tile: wall
    threshold: 0.78
    scale: 3.1
    seed: ruins_brush_v1

  # Pre-Shattering foundations surfacing through the grass — the settlement's
  # footprint, too wide to be coincidence, too eroded to be read.
  - type: noise_patch
    bounds: { all: true }
    over: grass
    tile: stone_floor
    threshold: 0.76
    scale: 2.6
    seed: ruins_foundations_v1

  # Wider scattered foundation traces beyond the standing structures — large-scale
  # patches suggest a settlement whose edges the ruins only approximate; the
  # scavenger line "foundations under the grass, you can feel them through your
  # boots" has spatial substance rather than just being dialogue.
  - type: noise_patch
    bounds: { all: true }
    over: grass
    tile: stone_floor
    threshold: 0.72
    scale: 4.8
    seed: ruins_outer_foundations_v1

  # Road entry from the north — where the old road south of Firdale arrives.
  - type: region
    id: north_road_entry
    shape: { kind: circle, r: 6 }
    at: { x: 35, y: 8 }
    floor: grass

  # Central ruin — the most recognizable surviving structure; three walls standing,
  # roof gone, interior exposed to weather. The masonry is better than anything
  # built in Firdale's current age.
  - type: region
    id: central_ruin
    shape: { kind: rect, w: 14, h: 10 }
    at: { relative_to: north_road_entry, side: south, gap: 10 }
    floor: stone_floor
    walls:
      tile: wall
      door: { side: north, tile: door }

  # Scatter rubble across the central ruin interior — collapse over centuries
  - type: noise_patch
    bounds: { region: central_ruin }
    over: stone_floor
    tile: dirt
    threshold: 0.52
    scale: 1.9
    seed: ruins_central_decay_v1

  # Dry well — a cistern stub in the ruin's southeast interior; ring of stone,
  # no water, old waterline stain visible at the rim.
  # Lore hook: mirrors the flooded cistern in the village sewers — same drainage
  # tradition, same pre-Shattering scale, different fate. This one ran dry;
  # the one beneath Firdale still holds water. No causal link asserted.
  - type: region
    id: dry_well
    shape: { kind: circle, r: 2 }
    at: { x: 38, y: 31 }
    floor: stone_floor

  # Scavenger camp south of the central ruin — fire ring, bedrolls, a season's
  # worth of tools and nothing much to show for them.
  # Lore hook: the scavengers are the faction presence here; independent, not
  # March-aligned, not Warden-affiliated — people who came for the ruins and
  # stayed because they have not found what they came for yet.
  - type: region
    id: scavenger_camp
    shape: { kind: circle, r: 4 }
    at: { relative_to: central_ruin, side: south, gap: 2 }
    floor: dirt

  # East mound — a low rise of collapsed masonry, mostly submerged in sod.
  # No walls survive; the floor is the only evidence anything stood here.
  - type: region
    id: east_mound
    shape: { kind: rect, w: 8, h: 6 }
    at: { relative_to: central_ruin, side: east, gap: 8 }
    floor: stone_floor

  # Decay on the east mound — more collapsed than the central structure
  - type: noise_patch
    bounds: { region: east_mound }
    over: stone_floor
    tile: dirt
    threshold: 0.38
    scale: 2.2
    seed: ruins_east_decay_v1

  # West threshold — two partial walls still standing at right angles;
  # a corner, nothing else. Whatever the room was is open sky now.
  # Lore hook: goblins have sheltered in this corner — fire marks on the stone.
  - type: region
    id: west_threshold
    shape: { kind: rect, w: 8, h: 5 }
    at: { relative_to: central_ruin, side: west, gap: 8 }
    floor: stone_floor
    walls:
      tile: wall
      door: { side: east, tile: door }

  # The old road south of Firdale still shows through the grass in dry weather —
  # two worn lines leading toward the central ruin.
  - type: road
    from: { region: north_road_entry, anchor: south }
    to:   { region: central_ruin,     anchor: north }
    tile: dirt
    width: 2

spawns:
  - entity: ruin_scavenger
    region: scavenger_camp
    count: 2
  # Carved stone fragment inside the ruin — a wall-face slab with unreadable
  # script; second instance of this cutting tradition after the dark_forest
  # standing stone. Static discovery; one placement, no respawn.
  - entity: carved_stone
    region: central_ruin
    count: 1
  # Goblins pressing in from the west — not a coordinated force, just opportunists
  # sheltering in old stone. The west threshold is contested.
  - entity: goblin
    region: west_threshold
    count: 3
    respawn_seconds: 25
  - entity: goblin
    region: central_ruin
    count: 2
    respawn_seconds: 30
  - entity: goblin
    region: east_mound
    count: 2
    respawn_seconds: 25

connections:
  north: starting_village
