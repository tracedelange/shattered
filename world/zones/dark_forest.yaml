id: dark_forest
name: Dark Forest
tileset: overworld

width: 60
height: 50
default_tile: grass

spawn_point: { region: clearing }

ops:
  # Scatter "trees" (wall tiles act as impassable trunks) across the whole zone.
  # The noise + threshold gives organic clusters with gaps to navigate.
  - type: noise_patch
    bounds: { all: true }
    over: grass
    tile: wall
    threshold: 0.62
    scale: 2.2
    seed: dark_forest_trees_v1

  # Main clearing carves trees out and gives the player a safe arrival tile.
  - type: region
    id: clearing
    shape: { kind: circle, r: 6 }
    at: { center: true }
    floor: grass

  # Smaller hollow to the north — a quiet sub-area.
  - type: region
    id: hollow
    shape: { kind: circle, r: 4 }
    at: { relative_to: clearing, side: north, gap: 5 }
    floor: grass

  # Goblin lair: an ellipse to the east, larger than the clearing.
  - type: region
    id: goblin_lair
    shape: { kind: ellipse, rx: 7, ry: 5 }
    at: { relative_to: clearing, side: east, gap: 4 }
    floor: dirt

  # Dirt paths between clearings carve through the trees.
  - type: road
    from: { region: clearing, anchor: north }
    to:   { region: hollow,   anchor: south }
    tile: dirt
    width: 1
  - type: road
    from: { region: clearing,    anchor: east }
    to:   { region: goblin_lair, anchor: west }
    tile: dirt
    width: 1

spawns:
  - entity: goblin
    region: clearing
    count: 3
    respawn_seconds: 25
  - entity: goblin
    region: goblin_lair
    count: 10
    respawn_seconds: 30

connections:
  south: starting_village
