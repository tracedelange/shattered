id: dark_forest
name: Dark Forest
tileset: overworld

width: 60
height: 50
default_tile: grass

spawn_point: { region: clearing }

ops:
  # Scatter "trees" (wall tiles act as impassable trunks) across the whole zone.
  # The noise + threshold gives organic clusters with gaps to navigate.
  - type: noise_patch
    bounds: { all: true }
    over: grass
    tile: wall
    threshold: 0.62
    scale: 2.2
    seed: dark_forest_trees_v1

  # Main clearing carves trees out and gives the player a safe arrival tile.
  - type: region
    id: clearing
    shape: { kind: circle, r: 6 }
    at: { center: true }
    floor: grass

  # Smaller hollow to the north — the only interior clearing with no natural cause.
  # Lore hook: growth does not return here; whatever keeps the hollow open is older
  # than the forest itself — possibly older than the current age entirely.
  - type: region
    id: hollow
    shape: { kind: circle, r: 4 }
    at: { relative_to: clearing, side: north, gap: 5 }
    floor: grass

  # Goblin lair: an ellipse to the east, larger than the clearing.
  - type: region
    id: goblin_lair
    shape: { kind: ellipse, rx: 7, ry: 5 }
    at: { relative_to: clearing, side: east, gap: 4 }
    floor: dirt

  # Ruin fragment north of the hollow — a collapsed threshold, no named builder.
  # Lore hook: cut angles and jointing belong to a tradition older than any kingdom
  # that built the road outside Firdale; now understood as a fragment of the larger
  # complex at the_old_stones to the north — a threshold that separated from its
  # source the way a stone separates from a wall.
  - type: region
    id: ruin_threshold
    shape: { kind: rect, w: 8, h: 4 }
    at: { relative_to: hollow, side: north, gap: 2 }
    floor: stone_floor
    walls:
      tile: wall

  # Standing stone at the hollow entrance — no maker's mark, no date.
  # Script cut into the face belongs to no surviving language.
  # Lore hook: found, not built — the correct form for a Gardener anomaly;
  # it predates the village, the road, and the kingdom that made the road.
  - type: region
    id: standing_stone
    shape: { kind: circle, r: 1 }
    at: { relative_to: hollow, side: south, gap: 1 }
  # walls: is ignored for non-rect shapes; use a shape op to paint wall tiles.
  - type: shape
    shape: { kind: circle, r: 1 }
    at: { relative_to: hollow, side: south, gap: 1 }
    tile: wall

  # Ruin decay — centuries of exposure after the roof fell; no mortar holds.
  - type: noise_patch
    bounds: { region: ruin_threshold }
    over: stone_floor
    tile: dirt
    threshold: 0.40
    scale: 1.8
    seed: dark_forest_ruin_decay_v1

  # Dirt paths between clearings carve through the trees.
  - type: road
    from: { region: clearing, anchor: north }
    to:   { region: hollow,   anchor: south }
    tile: dirt
    width: 1
  - type: road
    from: { region: clearing,    anchor: east }
    to:   { region: goblin_lair, anchor: west }
    tile: dirt
    width: 1

  # Narrow track from hollow north into the ruin — worn, as if used regularly
  # by something that leaves no footprints. Continues beyond the ruin_threshold
  # toward the_old_stones, though the trees close in before the zone edge.
  - type: road
    from: { region: hollow,         anchor: north }
    to:   { region: ruin_threshold, anchor: south }
    tile: dirt
    width: 1

  # East track continues past the lair boundary toward the Hold.
  # The March never followed it far enough to find what was at the end.
  - type: road
    from: { region: goblin_lair, anchor: east }
    to:   { edge: east, t: 0.5 }
    tile: dirt
    width: 1

spawns:
  - entity: goblin
    region: clearing
    count: 2
    respawn_seconds: 90
  - entity: goblin
    region: goblin_lair
    count: 5
    respawn_seconds: 120
  # The hollow watcher — a presence, not a creature; non-aggressive.
  # Mechanical payoff for the lore hook: players who linger in the hollow
  # will see it, making "feels watched" a tangible encounter rather than
  # flavor text. Respawns slowly — the hollow is never unoccupied.
  - entity: hollow_watcher
    region: hollow
    count: 1
    respawn_seconds: 300
  # Farmer remains — physical resolution point for the_missing_farmer quest.
  # Placed at the ruin to reward players who follow the hollow path north.
  # One-time discovery; no respawn.
  - entity: farmer_corpse
    region: ruin_threshold
    count: 1

connections:
  north: the_old_stones
  south: starting_village
  east: goblin_castle
