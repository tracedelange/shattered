# goblin_wood — Tanglewood
# Archetype: crucible — the main goblin encampment is the central contested ground
# Lore hooks:
#   - Goblin totems mark the tree-line at the east road. They were not here last season.
#   - A farmer went missing on the road through here. His cart is still upright near the east entry.
#   - Something larger than goblins left tracks near the old hollow in the west.

id: goblin_wood
name: Tanglewood
tileset: overworld
width: 60
height: 50
default_tile: grass
archetype: crucible
landmark: { x: 20, y: 23 }
focal_point: { region: main_camp }
spawn_point: { region: east_entry }

spatial_constraints:
  - type: adjacency
    target: firdale
    direction: east

connections:
  east: firdale

portals:
  - at: { x: 59, y: 22 }
    to: { zone: firdale, x: 0, y: 22 }

ops:
  # 1. PERIMETER FOREST — dense bands seal the zone edges
  - type: noise_patch
    bounds: { rect: { x: 0, y: 0, w: 60, h: 8 } }
    tile: tree
    threshold: 0.55
    scale: 3.5
    seed: gwood_trees_north_v1

  - type: noise_patch
    bounds: { rect: { x: 0, y: 42, w: 60, h: 8 } }
    tile: tree
    threshold: 0.55
    scale: 3.5
    seed: gwood_trees_south_v1

  - type: noise_patch
    bounds: { rect: { x: 0, y: 0, w: 10, h: 50 } }
    tile: tree
    threshold: 0.60
    scale: 3.0
    seed: gwood_trees_west_v1

  # 2. INTERIOR FOREST — lighter density throughout the zone body
  - type: noise_patch
    bounds: { rect: { x: 10, y: 8, w: 42, h: 34 } }
    tile: tree
    threshold: 0.42
    scale: 5.0
    seed: gwood_trees_interior_v1

  # 3. MAIN CAMP CLEARING — crucible focal point; only_over:[grass] preserves forest
  #    tiles that fell inside the bounds — the organic grass gaps from the interior
  #    noise become the natural clearing rather than a hard rect cutout.
  - type: region
    id: main_camp
    shape: { kind: rect, w: 16, h: 14 }
    at: { x: 10, y: 16 }
    floor: grass
    only_over: [grass]

  # 4. CAMP PERIMETER FRINGE — sparse tree fringe at clearing edges (cover positions)
  - type: noise_patch
    bounds: { rect: { x: 8, y: 14, w: 20, h: 18 } }
    tile: tree
    threshold: 0.15
    scale: 2.5
    seed: gwood_camp_edge_v1
    over: [grass]

  # 5. NORTH CAMP — scout/watcher camp; only_over preserves organic tree cover
  - type: region
    id: north_camp
    shape: { kind: rect, w: 10, h: 9 }
    at: { x: 5, y: 5 }
    floor: grass
    only_over: [grass]

  # 6. SOUTH PATROL BAND — worn patrol earth; only_over preserves organic tree cover
  - type: region
    id: south_patrol
    shape: { kind: rect, w: 18, h: 8 }
    at: { x: 8, y: 36 }
    floor: grass
    only_over: [grass]

  # 7. OLD HOLLOW — crumbled stone ruin in the deep west forest
  #    RESERVED: forward spawn point for "something larger than goblins" — nothing placed this pass.
  #    Cracked walls are broken enough to pass through.
  - type: stamp
    at: { x: 5, y: 22 }
    region: old_hollow
    prefab:
      data: |
        #########
        #.......#
        #.......#
        #.......#
        #.......#
        #.......#
        #.......#
        #.......#
        #########
      legend:
        '#': cracked_wall
        '.': cracked_stone_floor

  # 8. EAST ENTRY CORRIDOR — named region for player spawn and portal anchor
  - type: region
    id: east_entry
    shape: { kind: rect, w: 12, h: 7 }
    at: { x: 48, y: 19 }
    floor: grass

  # 9. MAIN ROAD — old dirt road east-to-camp (the route the farmer used)
  - type: route
    from: { x: 59, y: 22 }
    to: { x: 18, y: 22 }
    tile: dirt
    width: 3
    through: [tree]

  # 10. NORTH CAMP PATH — connects scout camp to main encampment
  - type: route
    from: { x: 14, y: 14 }
    to: { x: 16, y: 18 }
    tile: dirt
    width: 2
    through: [tree]

  # 11. SOUTH PATROL PATH — connects patrol band to main camp
  - type: route
    from: { x: 16, y: 36 }
    to: { x: 18, y: 30 }
    tile: dirt
    width: 2
    through: [tree]

  # 12. HOLLOW EXIT PATH — short link from old hollow east to main road
  - type: route
    from: { x: 10, y: 22 }
    to: { x: 18, y: 22 }
    tile: dirt
    width: 2
    through: [tree]

  # 13. FIREPIT — cracked stone ring with smoldering campfire at the landmark
  - type: shape
    shape: { kind: rect, w: 3, h: 3 }
    at: { x: 19, y: 22 }
    tile: cracked_stone_floor

  - type: shape
    shape: { kind: rect, w: 1, h: 1 }
    at: { x: 20, y: 23 }
    tile: campfire

  # 14. NORTH CAMP FIREPIT — smoldering coals at scout camp center
  - type: shape
    shape: { kind: rect, w: 1, h: 1 }
    at: { x: 10, y: 9 }
    tile: campfire

  # 15. PORTAL TILE — reciprocal portal back to Firdale
  - type: fill
    tile: portal
    bounds: { rect: { x: 59, y: 22, w: 1, h: 1 } }

  # 16. ENSURE REACH — guarantees north_camp, south_patrol, and old_hollow are reachable
  - type: ensure_reach
    from: { region: east_entry }
    ensure_all: true
    carve: dirt
    through: [tree]
    width: 2

spawns:
  # Main camp — primary combat zone
  - entity: goblin
    region: main_camp
    count: 5
    respawn_seconds: 120

  # Shaman — rare and notable; placed the totems, tends them still
  - entity: goblin_shaman
    region: main_camp
    count: 2
    respawn_seconds: 240

  # North camp — scouts watching the east road
  - entity: goblin
    region: north_camp
    count: 2
    respawn_seconds: 180

  # South patrol — 2 goblins on rotation
  - entity: goblin
    region: south_patrol
    count: 2
    respawn_seconds: 180

  # East entry — territorial markers and farmer's evidence
  - entity: goblin_totem
    region: east_entry
    count: 2

  - entity: farmer_corpse
    region: east_entry
    count: 1

  # Lost shipment coins — scattered through the main camp by goblins (quest_missing_goods)
  # No respawn: once collected they are gone. 5 placed for search tolerance (target is 3).
  - entity: gold_coin
    region: main_camp
    count: 1
  - entity: gold_coin
    region: main_camp
    count: 1
  - entity: gold_coin
    region: main_camp
    count: 1
  - entity: gold_coin
    region: south_patrol
    count: 1
  - entity: gold_coin
    region: south_patrol
    count: 1

  # Ambient wildlife — east forest animals, away from camp noise
  - entity: deer
    region: east_entry
    count: 2
    respawn_seconds: 300

  - entity: squirrel
    region: east_entry
    count: 3
    respawn_seconds: 300
