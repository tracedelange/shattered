id: the_old_stones
name: The Old Stones
tileset: overworld

width: 55
height: 50
default_tile: grass

spawn_point: { region: approach }

# Faction: old_stones_hermit — a single keeper whose length of occupation
# makes faction assignment approximate. Not affiliated with March, Warden,
# or any named cult. The site chose the person, or the person chose the site,
# and enough time has passed that the distinction no longer holds.
factions:
  - old_stones_hermit

ops:
  # Dense pre-Shattering forest — same unbroken canopy as dark_forest below.
  # The notable fact is where it stops: the courtyard boundary is a hard edge
  # that the trees have never crossed. No fence, no cleared margin, no cut stumps.
  # The growth pressure is visible from the tree line; the stopping point is not.
  - type: noise_patch
    bounds: { all: true }
    over: grass
    tile: wall
    threshold: 0.65
    scale: 2.4
    seed: old_stones_trees_v1

  # South approach — entry from the dark_forest ruin_threshold path; the dirt
  # track from the hollow widens here where it meets stone for the first time
  - type: region
    id: approach
    shape: { kind: circle, r: 5 }
    at: { x: 27, y: 44 }
    floor: grass

  # Stone courtyard — the old cleared precinct of the complex. No brush grows
  # inside this perimeter. Tree roots stop at the outer edge without cause.
  # Lore hook: the processional paving survives intact — same stone, same
  # cutting tradition as the ruin_threshold fragment in dark_forest and the
  # carved_stone at the southern ruins, but here it is original, not echo.
  # This is the source site. The others are fragments that traveled.
  - type: region
    id: stone_courtyard
    shape: { kind: rect, w: 26, h: 16 }
    at: { relative_to: approach, side: north, gap: 3 }
    floor: stone_floor

  # Courtyard wear — the paving cracks where the earth has shifted beneath it,
  # not where weather reached the surface; the decay comes from below
  - type: noise_patch
    bounds: { region: stone_courtyard }
    over: stone_floor
    tile: dirt
    threshold: 0.66
    scale: 2.2
    seed: old_stones_court_wear_v1

  # Central hall — the most intact surviving structure; walls at a scale larger
  # than anything in Firdale, the river crossing, or the southern ruins. Roof
  # collapsed; walls standing at near full height on three sides.
  # Lore hook: no named builder, no maker's mark. Found, not made — the correct
  # form for a Gardener anomaly. The masonry scale implies a purpose rather than
  # a settlement; whatever was done here was done deliberately and at scale.
  - type: region
    id: central_hall
    shape: { kind: rect, w: 14, h: 10 }
    at: { relative_to: stone_courtyard, side: north, gap: 1 }
    floor: stone_floor
    walls:
      tile: wall
      door: { side: south, tile: door }

  # Hall floor decay — collapse and centuries of silt through the open roof
  - type: noise_patch
    bounds: { region: central_hall }
    over: stone_floor
    tile: dirt
    threshold: 0.46
    scale: 2.0
    seed: old_stones_hall_decay_v1

  # Inner sanctum — more intact than the hall; the north wall never fell, and
  # nothing obvious explains why it survived when the rest did not.
  # Lore hook: a bowl-shaped depression at the sanctum's center — dry now,
  # ringed with old waterlines. Sixty-one centimeters at its widest. Twelve
  # deep at center. The same dimensions the ruins_scholar is currently
  # recording in the sealed room beneath Firdale. The same dimensions as the
  # dry well at the southern ruins. Three sites. Same measure. Same absence
  # of any surviving channel leading in or out.
  - type: region
    id: inner_sanctum
    shape: { kind: rect, w: 8, h: 6 }
    at: { relative_to: central_hall, side: north, gap: 0 }
    floor: stone_floor
    walls:
      tile: wall
      door: { side: south, tile: door }

  # Standing circle — seven carved stones in a rough ellipse in the western
  # courtyard; more stones here than at the hollow entrance and the southern
  # ruins fragment combined. Same script tradition. None of the seven
  # inscriptions are identical. None can be read.
  # Lore hook: this is the origin, not an echo. The standing stone at the
  # dark_forest hollow and the carved_stone at the southern ruins are instances
  # of a cutting tradition first practiced here, in greater number, for a
  # purpose that the seven variations suggest was not uniform.
  - type: region
    id: standing_circle
    shape: { kind: ellipse, rx: 5, ry: 4 }
    at: { relative_to: stone_courtyard, side: west, gap: 2 }
    floor: stone_floor

  # Hermit dwelling — stone and salvaged timber against the eastern courtyard
  # edge; long occupation with each iteration of the structure incorporating
  # pieces of the last one. Wood floor is the only non-original material here.
  - type: region
    id: hermit_dwelling
    shape: { kind: rect, w: 7, h: 5 }
    at: { relative_to: stone_courtyard, side: east, gap: 2 }
    floor: wood_floor
    walls:
      tile: wall
      door: { side: west, tile: door }

  # Processional path — old paving between the approach and the courtyard;
  # survives intact where everything around it has become overgrowth
  - type: road
    from: { region: approach,        anchor: north }
    to:   { region: stone_courtyard, anchor: south }
    tile: stone_floor
    width: 2

  # Gap fill between courtyard and hall entrance
  - type: road
    from: { region: stone_courtyard, anchor: north }
    to:   { region: central_hall,    anchor: south }
    tile: stone_floor
    width: 2

  # Passage from central hall north wall into inner sanctum — punches through
  # central_hall's north wall and inner_sanctum's south wall (which has no door).
  - type: road
    from: { region: central_hall,  anchor: north }
    to:   { region: inner_sanctum, anchor: south }
    tile: stone_floor
    width: 2

  # Track from courtyard west to standing circle
  - type: road
    from: { region: stone_courtyard, anchor: west }
    to:   { region: standing_circle, anchor: east }
    tile: dirt
    width: 1

  # Track from courtyard east to hermit dwelling
  - type: road
    from: { region: stone_courtyard, anchor: east }
    to:   { region: hermit_dwelling, anchor: west }
    tile: dirt
    width: 1

spawns:
  # The hermit — the site and the person have been here the same amount of time.
  # Not aggressive. Knows considerably more than they will volunteer.
  - entity: old_stones_hermit
    region: hermit_dwelling
    count: 1

  # Hollow watchers — concentrated here; the hollow in dark_forest below may be
  # a secondary expression of what gathers at this site rather than an origin
  # in its own right. They do not attack. They occupy the courtyard as naturally
  # as the stones occupy it.
  - entity: hollow_watcher
    region: stone_courtyard
    count: 2
    respawn_seconds: 180

  # A single watcher that does not leave the sanctum — the depression in the
  # floor holds something's attention that has not shifted in a very long time
  - entity: hollow_watcher
    region: inner_sanctum
    count: 1
    respawn_seconds: 300

  # Three carved_stone fixtures scattered across the standing_circle ellipse.
  # The hermit says "The seven stones in the circle are not the same inscription.
  # Most people do not notice that." These make that observation a discoverable
  # truth: a player must orbit the circle to find all three — no single angle
  # reveals them all. No respawn; these are permanent site features.
  # Stone A — northwest arc, visible on first approach from the courtyard path.
  - entity: carved_stone
    region: standing_circle
    count: 1
  # Stone B — south arc, encountered crossing toward the far side of the circle.
  - entity: carved_stone
    region: standing_circle
    count: 1
  # Stone C — northeast arc, last stone; requires walking the full perimeter.
  # Seven stones in the circle. None of the inscriptions are the same.
  - entity: carved_stone
    region: standing_circle
    count: 1

connections:
  south: dark_forest
