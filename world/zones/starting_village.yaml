id: starting_village
name: Starting Village
tileset: overworld
width: 50
height: 40
default_tile: grass
spawn_point:
  region: town_square
ops:
  - type: region
    id: town_square
    shape:
      kind: circle
      r: 7
    at:
      center: true
    floor: stone_floor
  - type: region
    id: fountain
    shape:
      kind: circle
      r: 1
    at:
      x: 24
      'y': 20
    floor: water
  - type: region
    id: inn
    shape:
      kind: rect
      w: 8
      h: 8
    at:
      relative_to: town_square
      side: south
      gap: 2
    floor: wood_floor
    walls:
      tile: wall
      door:
        side: north
        tile: door
  - type: region
    id: bazaar_court
    shape:
      kind: rect
      w: 12
      h: 10
    at:
      relative_to: town_square
      side: east
      gap: 2
    floor: dirt
  - type: noise_patch
    bounds:
      region: bazaar_court
    over: dirt
    tile: stone_floor
    threshold: 0.62
    scale: 1.4
    seed: bazaar_counters_v1
  - type: region
    id: stall_north
    shape:
      kind: rect
      w: 6
      h: 4
    at:
      relative_to: bazaar_court
      side: north
      gap: 1
    floor: wood_floor
    walls:
      tile: wall
      door:
        side: south
        tile: door
  - type: region
    id: stall_south
    shape:
      kind: rect
      w: 6
      h: 4
    at:
      relative_to: bazaar_court
      side: south
      gap: 1
    floor: wood_floor
    walls:
      tile: wall
      door:
        side: north
        tile: door
  - type: region
    id: guardhouse
    shape:
      kind: rect
      w: 8
      h: 6
    at:
      relative_to: town_square
      side: west
      gap: 2
    floor: stone_floor
    walls:
      tile: wall
      door:
        side: east
        tile: door
  - type: region
    id: sewer_grate
    shape:
      kind: rect
      w: 3
      h: 3
    at:
      relative_to: inn
      side: east
      gap: 1
    floor: stone_floor
  - type: region
    id: herald_post
    shape:
      kind: rect
      w: 3
      h: 3
    at:
      relative_to: guardhouse
      side: north
      gap: 1
    floor: stone_floor
  - type: road
    from:
      region: town_square
      anchor: south
    to:
      region: inn
      anchor: north
    tile: dirt
  - type: road
    from:
      region: town_square
      anchor: east
    to:
      region: bazaar_court
      anchor: west
    tile: dirt
  - type: road
    from:
      region: town_square
      anchor: west
    to:
      region: guardhouse
      anchor: east
    tile: dirt
  - type: road
    from:
      region: town_square
      anchor: north
    to:
      edge: north
      t: 0.5
    tile: dirt
    width: 2
  - type: road
    from:
      region: bazaar_court
      anchor: east
    to:
      edge: east
      t: 0.5
    tile: dirt
  - type: road
    from:
      region: inn
      anchor: south
    to:
      edge: south
      t: 0.5
    tile: dirt
  - type: region
    id: guard_tower
    shape:
      kind: rect
      w: 4
      h: 4
    at:
      x: 27
      'y': 1
    floor: stone_floor
    walls:
      tile: wall
      door:
        side: west
        tile: door
  - type: region
    id: northwest_meadow
    shape:
      kind: rect
      w: 12
      h: 10
    at:
      x: 1
      'y': 3
    floor: grass
  - type: region
    id: southeast_meadow
    shape:
      kind: rect
      w: 10
      h: 10
    at:
      x: 38
      'y': 30
    floor: grass
  - type: scatter
    bounds:
      all: true
    tile: tree
    count: 38
    seed: sv_trees_base
    over: grass
  - type: scatter
    bounds:
      rect:
        x: 0
        'y': 0
        w: 50
        h: 14
    tile: tree
    count: 28
    seed: sv_trees_north
    over: grass
spawns:
  - entity: merchant
    region: bazaar_court
    count: 2
    spawn_id: market_merchant
  - entity: merchant
    region: stall_north
    count: 1
  - entity: merchant
    region: stall_south
    count: 1
  - entity: village_guard
    region: guard_tower
    count: 1
    spawn_id: north_gate_guard
    respawn_seconds: 60
  - entity: village_guard
    region: guardhouse
    count: 1
    spawn_id: guardhouse_sergeant
    respawn_seconds: 60
  - entity: village_guard
    region: guardhouse
    count: 1
    respawn_seconds: 60
  - entity: citizen
    region: town_square
    count: 3
  - entity: citizen
    region: bazaar_court
    count: 3
  - entity: march_herald
    region: herald_post
    count: 1
    spawn_id: herald_post_herald
  - entity: deer
    region: northwest_meadow
    count: 2
    respawn_seconds: 180
  - entity: deer
    region: southeast_meadow
    count: 1
    respawn_seconds: 180
  - entity: squirrel
    region: northwest_meadow
    count: 3
    respawn_seconds: 90
  - entity: squirrel
    region: southeast_meadow
    count: 2
    respawn_seconds: 90
  - entity: torch
    region: town_square
  - entity: torch
    region: town_square
  - entity: torch
    region: town_square
  - entity: torch
    region: town_square
connections:
  north: dark_forest
  east: river_crossing
  south: southern_ruins
portals:
  - at:
      x: 25
      'y': 29
    to:
      zone: tavern
      x: 16
      'y': 20
  - at:
      x: 32
      'y': 33
    to:
      zone: village_sewers
      x: 27
      'y': 33
  - at:
      x: 12
      'y': 20
    to:
      zone: firdale_barracks
      x: 15
      'y': 18
