id: tavern
name: The Split Crown
tileset: overworld

# Interior zone — single connected building, void surrounds on all sides.
# One outer shell provides the exterior walls; inner regions are floor-only
# (no extra wall layers) so the whole space stays walkable.
width: 32
height: 30
default_tile: void

# Structural model (place-before-tiles): archetype = internal spatial grammar;
# landmark = the zone's heart point and default narrative anchor.
archetype: hearth
landmark: { x: 22, y: 13 }
focal_point: { region: hearth }

spawn_point: { region: common_room }

ops:
  # Outer building shell — the entire tavern footprint.
  # Only this region has exterior walls; everything else paints floors inside it.
  # Lore hook: four names, two fires. Still standing.
  - type: region
    id: building
    shape: { kind: rect, w: 22, h: 24 }
    at: { x: 5, y: 4 }
    floor: wood_floor
    walls:
      tile: wall
      door: { side: south, tile: door }

  # Back room — cold stone, old ledgers, a door the barkeep never explains.
  # Lore hook: oldest ledger's dates predate the building by at least one age.
  - type: region
    id: back_room
    shape: { kind: rect, w: 12, h: 6 }
    at: { x: 10, y: 5 }
    floor: stone_floor

  # Bar area — barkeep's domain; nobody else goes behind the counter.
  - type: region
    id: bar_area
    shape: { kind: rect, w: 16, h: 6 }
    at: { x: 8, y: 11 }
    floor: wood_floor

  # Hearth — stone surround in the northeast of the bar.
  # Stone circle sits in the wood floor, visually marking the fire corner.
  # Lore hook: the fire that never goes out; no one remembers when it was lit.
  - type: region
    id: hearth
    shape: { kind: circle, r: 2 }
    at: { x: 20, y: 11 }
    floor: stone_floor

  # Common room — main hall, low ceiling, travelers and locals alike.
  - type: region
    id: common_room
    shape: { kind: rect, w: 20, h: 10 }
    at: { x: 6, y: 17 }
    floor: wood_floor

  # Bar counter — wall row separating common room from bar area.
  # Two-tile gap at the east end (x:24..25) so players can walk around the back.
  - type: fill
    bounds: { rect: { x: 6, y: 17, w: 18, h: 1 } }
    tile: wall

  # Counter ledge — stone surface on the common-room side of the bar wall.
  # Players stand here to talk to the barkeep across the counter.
  - type: fill
    bounds: { rect: { x: 6, y: 18, w: 18, h: 1 } }
    tile: stone_floor

  # Worn floorboards — years of boots, spilled ale, chairs scraped to the fire
  - type: noise_patch
    bounds: { region: common_room }
    over: wood_floor
    tile: dirt
    threshold: 0.82
    scale: 1.5
    seed: tavern_wear_v1

  # Bar grime — the strip of floor behind the counter takes its own abuse
  - type: noise_patch
    bounds: { region: bar_area }
    over: wood_floor
    tile: dirt
    threshold: 0.80
    scale: 1.3
    seed: tavern_bar_grime_v1

  # Scattered stone table surfaces — worn flat from mugs and elbows
  - type: scatter
    bounds: { region: common_room }
    tile: stone_floor
    count: 7
    seed: tavern_tables_v1
    over: wood_floor

spawns:
  - entity: barkeep
    region: bar_area
    count: 1
    spawn_id: tavern_barkeep
  - entity: patron
    region: common_room
    count: 4
    respawn_seconds: 120

  # The fire that never goes out — anchors the hearth corner.
  - entity: torch
    region: hearth
    count: 1
  # Common-room lanterns keep the main hall warm after dark.
  - entity: torch
    region: common_room
    count: 2
  # A single lamp over the bar and one in the back room.
  - entity: torch
    region: bar_area
    count: 1
  - entity: torch
    region: back_room
    count: 1

portals:
  - at: { x: 16, y: 27 }
    to: { zone: starting_village, x: 25, y: 28 }
