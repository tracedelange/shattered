id: tavern
name: The Wanderer's Rest
tileset: overworld

# Everything outside the room is void (unwalkable, black) — this is an
# interior-only zone. The wood-floored room sits in the middle.
width: 22
height: 16
default_tile: void

regions:
  - id: main_room
    type: building_interior
    size: large       # 6x6 base * 1.6 → 10x10 walled room with a south door
    center: true
    # door_side defaults to 'south' for centered walled rooms

spawns:
  - entity: merchant
    region: main_room
    count: 1

# Return portal at the south door of the main room. Stepping on it sends the
# player back to starting_village just north of the inn's door so they don't
# immediately re-trigger that portal.
portals:
  - at: { x: 11, y: 12 }
    to: { zone: starting_village, x: 20, y: 20 }
