id: tavern
name: The Wanderer's Rest
tileset: overworld

# Interior-only zone — anything outside the walled room is void.
width: 22
height: 16
default_tile: void

spawn_point: { region: main_room }

ops:
  - type: region
    id: main_room
    shape: { kind: rect, w: 12, h: 12 }
    at: { center: true }
    floor: wood_floor
    walls:
      tile: wall
      door: { side: south, tile: door }

spawns:
  - entity: merchant
    region: main_room
    count: 1

# Return portal at the south door of the main room (computed from AABB midpoint).
# Lands the player one tile north of the inn door so they don't immediately
# re-trigger the village portal.
portals:
  - at: { x: 11, y: 13 }
    to: { zone: starting_village, x: 25, y: 28 }
