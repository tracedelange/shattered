# old_road_east — The Old Road
# Archetype: approach — the zone is meant to be traversed west to east; the ruined waystation is the payoff
# Lore hooks:
#   - A milestone stone reads in a script no one in Firdale can read. The road is older than the village.
#   - A herald passed through three days ago and did not slow to speak. His destination is east.
#   - The waystation was not built by anyone from Firdale, and no one remembers it being built.

id: old_road_east
name: The Old Road
tileset: overworld
width: 60
height: 40
default_tile: grass
archetype: approach
landmark: { region: waystation_ruin }
spawn_point: { region: west_entry }

spatial_constraints:
  - type: adjacency
    target: firdale
    direction: west
    note: firdale sits on the west side of this zone; connections.east added to firdale.yaml
  - type: distance
    target: goblin_wood
    min_zones: 2
    note: goblin_wood is west of firdale, which is west of this zone — two hops minimum

connections:
  west: firdale

ops:
  # 1. NORTH HILL BAND — dense wooded hills frame the north shoulder of the road
  - type: noise_patch
    bounds: { rect: { x: 0, y: 0, w: 60, h: 15 } }
    tile: tree
    threshold: 0.50
    scale: 4.5
    seed: old_road_hills_north_v1

  # 2. SOUTH HILL BAND — same treatment for the south shoulder
  - type: noise_patch
    bounds: { rect: { x: 0, y: 26, w: 60, h: 14 } }
    tile: tree
    threshold: 0.50
    scale: 4.5
    seed: old_road_hills_south_v1

  # 3. INTERIOR LIGHT SCATTER — sporadic roadside trees add texture without closing the road
  - type: noise_patch
    bounds: { rect: { x: 0, y: 14, w: 60, h: 12 } }
    tile: tree
    threshold: 0.22
    scale: 3.0
    seed: old_road_interior_v1

  # 4. WEST ENTRY — open grass shoulder at the Firdale portal; first breath of road
  - type: region
    id: west_entry
    shape: { kind: rect, w: 12, h: 10 }
    at: { x: 0, y: 15 }
    floor: grass

  # 5. ROAD CORRIDOR — named strip for spawn placement along the main axis
  - type: region
    id: road_corridor
    shape: { kind: rect, w: 58, h: 5 }
    at: { x: 0, y: 18 }
    floor: grass

  # 6. MAIN ROAD — the old cart road, west to east; carries the player to the waystation
  - type: route
    from: { x: 0, y: 20 }
    to: { x: 59, y: 20 }
    tile: dirt
    width: 3
    through: [tree]

  # 7. NORTH FORK CLEARING — intentionally empty; a discoverable dead end hinting at future depth
  - type: region
    id: north_fork_clearing
    shape: { kind: rect, w: 8, h: 7 }
    at: { x: 22, y: 7 }
    floor: grass

  # 8. NORTH FORK PATH — branches from the road near the midpoint into the north hill trees
  - type: route
    from: { x: 25, y: 18 }
    to: { x: 26, y: 9 }
    tile: dirt
    width: 2
    through: [tree]

  # 9. WAYSTATION RUIN — the far-end payoff; cracked walls, unreadable milestone inside
  #    Stamp centered at (53,16), 12×9: spans x=47-58, y=12-20.
  #    South wall row (y=20): #####DD##### — door gap at x=52-53 aligns to road center,
  #    keeping the ruin interior accessible from the road.
  - type: stamp
    at: { x: 53, y: 16 }
    region: waystation_ruin
    prefab:
      data: |
        ############
        #..........#
        #..........#
        #..........#
        #..........#
        #..........#
        #..........#
        #..........#
        #####DD#####
      legend:
        '#': cracked_wall
        '.': cracked_stone_floor
        D: door
      anchors:
        D: door

  # 10. SOUTH FRINGE REGION — clear patch in the south hill band for ambient wildlife
  - type: region
    id: south_fringe
    shape: { kind: rect, w: 16, h: 6 }
    at: { x: 22, y: 30 }
    floor: grass

  # 11. EAST PORTAL TILE — forward reference; destination zone does not exist yet.
  #     Placed so future zone creation can wire it without hunting.
  - type: fill
    tile: portal
    bounds: { rect: { x: 59, y: 20, w: 1, h: 1 } }

  # 12. ENSURE REACH — run last; connects north_fork_clearing and waystation_ruin interior
  - type: ensure_reach
    from: { region: west_entry }
    ensure_all: true
    carve: dirt
    through: [tree]
    width: 2

spawns:
  # March herald — walks the road east; does not stop to speak
  - entity: march_herald
    region: road_corridor
    count: 1

  # Milestone stones — three along the road in ascending distance from Firdale
  #   The script on them is unreadable. The road is older than the village.
  - entity: milestone_stone
    region: west_entry
    count: 1
  - entity: milestone_stone
    region: road_corridor
    count: 1
  - entity: milestone_stone
    region: waystation_ruin
    count: 1

  # Deer — scattered between the north clearing and south fringe
  - entity: deer
    region: north_fork_clearing
    count: 1
    respawn_seconds: 300
  - entity: deer
    region: south_fringe
    count: 1
    respawn_seconds: 300

  # Squirrels — ambient wildlife in the tree-fringe areas
  - entity: squirrel
    region: north_fork_clearing
    count: 1
    respawn_seconds: 300
  - entity: squirrel
    region: south_fringe
    count: 2
    respawn_seconds: 300
