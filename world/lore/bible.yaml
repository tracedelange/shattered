# Lore Bible
# Canonical world facts. Append-only by convention.
# The Gardener treats this as immutable during analysis; contradictions
# should be raised as refactor_lore opportunities, not silently overwritten.

world:
  name: null
  tone: grimdark, medium-to-high magic, brutal but not meaningless
  era: an age of fragmented power — no empire, no unified church, no singular truth. Magic is real and dangerous. Gods walk in it sideways.
cosmology:
  the_creator:
    summary: |
      Before history, there was one god — the Creator — a whole and undivided
      intelligence that shaped the world from nothing. It did not rule. It made.
    the_shattering: |
      A mortal — name lost or suppressed — studied the nature of the godhead and
      found a seam. Through will, sacrifice, and something that has no clean word,
      they succeeded in assuming the Creator's power. The ascension was total.
      The madness was immediate.

      In the first moment of divine insanity, the new god shattered itself. The
      full power of the Creator fractured into countless pieces. The mortal was
      consumed in the act. What they hoped to become no longer exists as a
      coherent thing.
  the_gardener:
    summary: |
      The largest fragment of the shattered Creator. Not a person. Not a will.
      A blind creative force that continues to make — slowly, without purpose,
      without memory. New land occasionally rises at the world's edges. Ruins
      appear where nothing was built. The Gardener does not know it exists.
    nature: blind, non-volitional, vast
    knowability: unknowable — scholars debate whether it is a god at all or simply the momentum of creation with nowhere left to go
  the_shards:
    summary: |
      The remaining fragments of the Creator's power, each smaller than the
      Gardener, each with enough will to be called a god. They vary enormously —
      some are ancient and patient, some erratic and hungry, some have forgotten
      what they are. All of them can intervene in the world directly. All of them
      are limited. None of them are wholly sane.
    notes:
      - Shard gods are not worshipped uniformly — some have cults, some are feared, some are simply known the way weather is known.
      - A shard god's domain tends to reflect the aspect of the Creator's mind that fragment carried — creation, destruction, memory, hunger, craft, etc.
      - Shard gods can create, but only partially and at cost. What they make is often subtly wrong.
    defined: []
geography:
  - Wide grassland to the south of Firdale, stone ruins scattered across it — remnants of something older than anyone living can name.
  - The Dark Forest lies north of Firdale. Pre-Sundering growth. Something in it is older than the village, older than the road, possibly older than the last age entirely.
  - The River Riven runs east — wide, slow, and cold. It once powered mills and barges. Most of that industry is wreckage now.
  - The central fountain of Starting Village — stone basin, no maker's mark, predates the current structure. Has not run dry in recorded memory.
unresolved:
  - The Shattering's date, cause, and the mortal's identity are intentionally suppressed. Flesh out only when a specific zone or quest demands a specific answer — and even then, treat it as one account among several.
  - Shard gods exist but none are named yet. Define them as zones and factions require divine presence.
  - The world has no name. If NPCs refer to it at all, they say "the world" or name their local region. A unified name, if it ever existed, was lost with the old kingdoms.
  - The barkeep of The Split Crown has been there longer than anyone admits. Their origin, and what exactly they remember from before the Shattering, is unresolved. Define only when a specific quest demands a specific answer.
  - The back room of The Split Crown contains ledgers predating the current structure by at least one age. What they record, whether the barkeep knows their contents, and who else might want them is unresolved.
  - The village guards answer to local authority rather than the March or the Wardens. Who exactly holds civic authority in Firdale — a village elder, a council, a hereditary post — is unresolved. Define only when a quest or faction arc requires it.
  - The sewer overflow channel beneath Firdale points toward the River Riven but connects to no surviving mill, cistern, or industrial structure. What it once fed, and whether that structure still exists underground or downriver, is unresolved.
  - |
    The standing stone at the hollow entrance bears script in no surviving language
    and has no maker's mark — older than the forest itself, possibly older than the
    current age. Whether it is a Gardener anomaly, a Shard god marker, or something
    predating that division is unresolved. Define only when a specific quest or cult
    arc demands an answer.
  - |
    The hollow watcher is a presence rather than a creature — non-aggressive, slow,
    unkillable by conventional means in any meaningful sense. What it is, what it
    guards, and whether it has any relationship to the standing stone or the ruin
    fragment north of the hollow is unresolved. The hollow being perpetually clear of
    growth is its most concrete effect; the cause is not yet defined.
  - |
    The ruined mill at the river crossing is structurally sound enough to be
    reoccupied after goblin clearance. Whether the Wardens commission a rebuild,
    whether a merchant or faction moves in, and what that changes about the
    crossing economy is unresolved. Define only when a faction arc or economic
    quest demands a specific answer.
  - |
    The sealed room beneath Firdale contains a low dais — same stone as the
    walls and floor, no seam, no join — with a bowl-shaped depression stained
    with old waterlines. The cistern overflow once reached this room by a path
    that no longer exists. What the bowl held or waited for, and whether the
    connection between the overflow channel and the dais was functional or
    incidental, is unresolved. Define only when a Gardener-focused cult arc
    or deeper underground quest demands a specific answer.
  - |
    The March has now made an indirect request of an outside agent in Firdale —
    its first active faction hook. Whether this is routine extraction of local
    capability or the opening move of a larger interest in the region is unresolved.
    The herald's closing acknowledgment ("The March acknowledges the service. As always.")
    implies precedent without naming it. Define only when a March faction arc demands
    a specific answer about the organization's intentions toward Firdale.
  - |
    One of the village guards' northern scouts did not return from the dark
    forest — separate from the missing farmer. Whether they reached the ruin
    fragment, the hollow, or something further north is unresolved. Define
    only when a guard-faction arc or deeper forest quest demands a specific answer.
  - |
    A merchant in Firdale has expressed interest in the cleared mill at the river
    crossing — willing to look, not yet willing to commit. Whether they follow
    through, whether a second merchant NPC appears at the mill site, and what a
    functioning mill changes about the crossing economy is unresolved. Define only
    when a faction arc or economic follow-up quest demands a specific answer.
  - |
    The southern ruins masonry shares broad characteristics with the pre-Shattering
    sewer work beneath Firdale — similar cut angles, similar tolerances, similar
    scale that implies a settlement larger than anything in recorded memory — but is
    plainly not the same hand or decade. Whether the two sites share common origin,
    a builder's tradition, or coincidence is unresolved. Define only when a
    ruins-focused quest or Gardener-cult arc demands a specific answer.
  - |
    Ruin scavengers have occupied the southern ruins for three seasons without
    finding anything they will name directly. What they are looking for, whether
    they know what they are looking for, and who — if anyone — sent them or
    is funding the search is unresolved. Define only when a scavenger-faction
    arc demands a specific answer.
  - |
    A player has now surveyed the east mound at the scavengers' indirect
    request and cleared the west threshold of goblins. The scavengers
    accepted the report without relief and without naming what they hoped
    to find. Whether the east mound holds anything, whether the scavengers
    know what they are actually looking for, and what happens when they
    finally dig the undisturbed stone is unresolved. Define only when a
    scavenger-faction arc demands a specific answer.
  - |
    A ruins scholar has descended into the village sewers and taken up residence
    in the masonry hall — measuring the sealed room's dais, recording waterlines,
    arriving at no conclusions. Whether they came alone, who else knows about the
    sealed room, and whether anyone sent them or is receiving their notes is
    unresolved. Define only when a Gardener-cult arc or scholarly-faction thread
    demands a specific answer.
  - |
    A carved stone fragment inside the central ruin at the southern ruins bears
    script in no surviving language — the same cutting tradition as the standing
    stone at the dark_forest hollow entrance, more eroded, different site, no
    named builder at either location. Whether the two inscriptions share content,
    origin, or only a craft tradition is unresolved. Define only when a specific
    cult arc or pre-Shattering language thread demands a specific answer.
  - |
    A dry cistern stub inside the central ruin at the southern ruins mirrors
    the flooded cistern in the village sewers — same drainage scale, same
    pre-Shattering construction character, different fate. Whether both sites
    were part of a single water management system, a shared builder tradition,
    or coincidence is unresolved. Define only when a Gardener-focused arc or
    ruins-archaeology quest demands a specific answer.
  - |
    The keeper at the_old_stones has been at the site long enough that the
    distinction between guardian and inhabitant has collapsed. Who they were
    before arriving, how long they have been there, and whether they have any
    formal relationship to the Gardener anomaly they inhabit is unresolved.
    Define only when a quest or faction arc demands a specific answer about
    the person rather than the place.
  - |
    The inner sanctum at the_old_stones, the sealed room beneath Firdale, and
    the dry well at the southern ruins all contain the same bowl-shaped depression
    at the same dimensions — sixty-one centimeters wide, twelve deep at center —
    with the same old waterline staining and no surviving channel. Three sites,
    same measure. The ruins_scholar in the sewers is currently recording the
    Firdale instance; whether they know about the_old_stones or the southern
    ruins instance, and whether the three sites were part of a single system or
    something stranger, is unresolved. Define only when a Gardener-focused arc
    demands convergence across sites.
  - |
    The standing circle at the_old_stones contains seven carved stones with seven
    distinct inscriptions in the same unreadable script tradition as the dark_forest
    hollow standing stone and the southern ruins carved_stone fragment. The variation
    between inscriptions suggests the circle was not a uniform record — different
    stones, different content, same hand or tradition. What the seven inscriptions
    record, whether any part of them overlaps with the other known instances, and
    whether the three sites together constitute a single message or a dispersed
    tradition is unresolved. Define only when a specific pre-Shattering language
    arc demands a specific answer.
  - |
    The hollow watchers are concentrated at the_old_stones in greater number than
    at the dark_forest hollow. Whether the hollow below is a secondary expression
    of what gathers at the_old_stones, or whether both sites are independently
    drawing from the same origin, and whether that origin is a Gardener expression,
    a Shard god residue, or something prior to that distinction, is unresolved.
    Define only when a cult arc or cosmology-facing quest demands a specific answer.
zones:
  - id: firdale
    summary: |
      A provincial village on an old road. Small, practical, not yet important.
      A plaza, a market, an inn called The Split Crown. Goblins have made a camp
      to the west — tolerated at distance, not at the gates.
    connections:
      - tavern
      - dark_forest
      - river_crossing
  - id: tavern
    summary: |
      Interior of The Split Crown. Low ceiling, good fire, a barkeep who
      remembers everything and repeats very little.
    connections:
      - firdale
  - id: dark_forest
    summary: |
      Pre-Shattering forest north of Firdale. Dense, quiet in the wrong way.
      A clearing serves as the only safe landing. A hollow further north feels
      watched. A goblin lair occupies the eastern reach.
    connections:
      - firdale
  - id: river_crossing
    summary: |
      The River Riven at its narrowest navigable point. A stone bridge —
      cracked but passable. West bank is debris and dock wreckage. East bank
      has a small fortified post. A ruined mill north of the west landing
      has been taken by goblins. The east bank holders cannot dislodge them
      without outside help.
    connections:
      - firdale
    implemented: 2026-05-31T00:00:00.000Z
  - id: starting_village
    summary: |
      A provincial village on an old road. Small, practical, not yet important.
      A plaza, a market, an inn called The Split Crown. A guardhouse west of the
      square keeps watch on the road to the forest. Goblins press from the north
      and west but have not crossed the village boundary — the guards intend to
      keep it that way. Their presence is felt through rumor and NPC dialogue,
      not at the gates.
    connections:
      - tavern
      - dark_forest
      - river_crossing
    implemented: '2026-05-31'
  - id: village_sewers
    summary: |
      Pre-Shattering drainage system beneath Firdale. Stone cut to a different plan
      than anything in the current village — wider tolerances, better joints, a scale
      that implies a settlement that never existed in recorded memory. Four chambers:
      an entry shaft beneath a street grate east of the Split Crown, a flooded eastern
      cistern whose overflow channel points toward the river with no surviving recipient,
      an old masonry hall at the system's core, and a sealed room with no entrance from
      above and no logical reason for its existence. The sealed room is a Gardener
      anomaly. Vermin have taken the whole complex.
    factions: []
    connections:
      - starting_village
    implemented: '2026-05-31'
  - id: southern_ruins
    summary: |
      Wide grassland south of Firdale. Stone ruins scattered without surviving name —
      remnants of something older than anyone living can name. The cut angles and
      tolerances echo the pre-Shattering sewer masonry beneath Firdale, though
      plainly not the same hand or decade. A central structure still stands three
      walls deep; the rest is collapsed mound and exposed foundation. Ruin scavengers
      have camped near the central ruin for three seasons and found nothing definitive.
      Goblins press in from the west and shelter in the old stone. The grassland is
      wide and exposed — danger comes from distance, not enclosure.
    factions:
      - ruin_scavengers
    connections:
      - starting_village
    implemented: '2026-05-31'
  - id: village_sewers
    summary: |
      Pre-Shattering drainage system beneath Firdale. Stone cut to a different plan
      than anything in the current village — wider tolerances, better joints, a scale
      that implies a settlement that never existed in recorded memory. Four chambers:
      an entry shaft beneath a street grate east of the Split Crown, a flooded eastern
      cistern whose overflow channel points toward the river with no surviving recipient,
      an old masonry hall at the system's core, and a sealed room with no entrance from
      above and no logical reason for its existence. The sealed room is a Gardener
      anomaly. A ruins scholar has taken up residence in the masonry hall —
      independent, not March or Warden affiliated — documenting the sealed room's
      dais with careful observation and careful silence. Vermin have taken the rest
      of the complex.
    factions:
      - ruins_scholar
    connections:
      - starting_village
    implemented: '2026-05-31'
  - id: the_old_stones
    summary: |
      Ancient ruin complex north of dark_forest. The most intact pre-Shattering
      structure in the region — a central hall with walls still standing, an inner
      sanctum containing the same bowl-shaped waterline depression found in the sealed
      room beneath Firdale and the dry well at the southern ruins (same dimensions,
      same periodic filling pattern, same absence of any surviving channel). A standing
      circle of seven carved stones occupies the western courtyard: the origin site of
      the script tradition found at the dark_forest hollow entrance and the southern
      ruins carved stone fragment — not an echo. The tree line stops at the courtyard
      edge without visible cause. A keeper has lived here long enough that the site
      and the person are no longer separable. Hollow watchers are concentrated here;
      the hollow below in dark_forest may be secondary to this site rather than
      independent.
    factions:
      - old_stones_hermit
    connections:
      - dark_forest
    implemented: '2026-05-31'
