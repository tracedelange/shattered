# Prefixes appear before the base name ("Flaming Iron Sword"). `rarity` gates the
# minimum item rarity at which an affix becomes eligible. Brand keys
# (fire_damage, etc.) and stat keys are read by combat via sumEquipRolled.
# Magnitudes here are pre-scaling references; rarity × ilvl scales them at roll.
prefixes:
  # ── brands (flat bonus damage; combat reads BRAND_KEYS) ──────────────────────
  - id: flaming
    applies_to: [blade, blunt, melee]
    rarity: uncommon
    name_prefix: "Flaming"
    bonus: { fire_damage: [1, 4] }

  - id: frost
    applies_to: [blade, blunt, melee]
    rarity: uncommon
    name_prefix: "Frost"
    bonus: { cold_damage: [1, 4] }

  - id: venomous
    applies_to: [blade, light]
    rarity: uncommon
    name_prefix: "Venomous"
    bonus: { poison_damage: [1, 3] }

  - id: shocking
    applies_to: [blade, blunt, staff]
    rarity: rare
    name_prefix: "Shocking"
    bonus: { lightning_damage: [2, 6] }

  - id: arcane
    applies_to: [staff, melee]
    rarity: rare
    name_prefix: "Arcane"
    bonus: { arcane_damage: [2, 5] }

  # ── flat weapon power ────────────────────────────────────────────────────────
  - id: keen
    applies_to: [blade, light]
    rarity: common
    name_prefix: "Keen"
    bonus: { damage_bonus: [1, 2] }

  - id: weighty
    applies_to: [blunt, heavy]
    rarity: common
    name_prefix: "Weighty"
    bonus: { damage_bonus: [2, 3] }

  - id: swift
    applies_to: [melee]
    rarity: common
    name_prefix: "Swift"
    bonus: { speed: 0.3 }

  - id: balanced
    applies_to: [melee]
    rarity: common
    name_prefix: "Balanced"
    bonus: { speed: 0.15, damage_bonus: 1 }

  - id: vicious
    applies_to: [blade, blunt, melee]
    rarity: rare
    name_prefix: "Vicious"
    bonus: { damage_bonus: [3, 5] }

  - id: brutal
    applies_to: [blunt, heavy]
    rarity: legendary
    name_prefix: "Brutal"
    bonus: { damage_bonus: [5, 8] }

  # ── armor ────────────────────────────────────────────────────────────────────
  - id: sturdy
    applies_to: [armor]
    rarity: common
    name_prefix: "Sturdy"
    bonus: { defense_bonus: [1, 2] }

  - id: reinforced
    applies_to: [heavy, armor]
    rarity: uncommon
    name_prefix: "Reinforced"
    bonus: { defense_bonus: [1, 3] }

  - id: bulwark
    applies_to: [armor, heavy]
    rarity: rare
    name_prefix: "Bulwark"
    bonus: { defense_bonus: [3, 5] }

  # ── jewelry ──────────────────────────────────────────────────────────────────
  - id: charmed
    applies_to: [jewelry, ring, amulet]
    rarity: uncommon
    name_prefix: "Charmed"
    bonus: { armor: [1, 2] }

  - id: ancient
    applies_to: [staff, jewelry, amulet]
    rarity: rare
    name_prefix: "Ancient"
    bonus: { speed: 0.2, damage_bonus: [1, 2] }
