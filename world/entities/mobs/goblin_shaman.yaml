# Lore hook: the shaman placed the totems and tends them. The carvings on
# the totems are not goblin work — something spoke to the shaman first.
# What spoke is not a name the shaman knows. Only that it was warm.
dialogue:
  - "The marks are not mine. I only listen."
  - "Something found us here. We did not find it."
  - "The warmth does not leave the bone. I have tried."
  - "Hsssk. You smell wrong."
  - "The totems hold what I cannot."
