# Lore hook: been here long enough that the distinction between guardian
# and inhabitant has collapsed. The site and the person have been here
# the same amount of time, which is longer than anyone has measured.
dialogue:
  - "You came from the south. Through the hollow."
  - "The stones were here before I arrived. I arrived a long time ago."
  - "Nothing written on them survives translation. That is not an accident."
  - "The place keeps itself clear. I did not clear it."
  - "You felt it in the hollow, yes? Closer here. It has always been closer here."
  - "I stopped asking what built this long before you were born."
  - "The tree roots stop at the courtyard edge. They have always stopped there."
  - "What you are looking for — I cannot tell you if it is here. But it is not nowhere."
  - "I watch. The place watches back. We have come to an arrangement."
  - "The seven stones in the circle are not the same inscription. Most people do not notice that."
