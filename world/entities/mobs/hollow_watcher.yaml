# Lore hook: not a creature — a presence. Pre-Shattering in origin, possibly
# older. It does not attack. It does not flee. It simply watches, and the hollow
# stays clear of growth because it is here.
dialogue:
  - "(The air is wrong here. Too still, too aware.)"
  - "(Something has eyes on you that do not blink.)"
  - "(You cannot see clearly what watches. It sees you without difficulty.)"
  - "(The hollow has been clear of growth for longer than anyone can account for.)"
