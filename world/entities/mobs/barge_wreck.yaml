# Lore hook: the barge lines ran all the way to the delta once — this hull is
# the spatial referent for warden_guard dialogue that previously had nothing
# to point at. A schedule nailed to the bow post is the Sundering's most
# precise timestamp on this zone.
dialogue:
  - "(A hull half-submerged in the river margin — planking stripped above the waterline, ribs exposed where rot finished what the Sundering started. A cargo schedule, faded but legible, is still nailed to the bow post. The last entry is for a season nobody in the village can name.)"
