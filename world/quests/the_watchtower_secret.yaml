id: the_watchtower_secret
name: The Watchtower Secret
giver: guard_captain
zone: village_41_41
description: |
  Captain Renn believes there are old patrol logs hidden in a ruined watchtower on the Salt-Spray Cliffs. 
  He needs someone to scout the location and confirm if the records are still there.
stages:
  - id: start
    text: Renn mentioned an old watchtower on the cliffs that might hold patrol logs.
    on_complete: reach_tower
  - id: reach_tower
    text: Locate the ruined watchtower in the Salt-Spray Cliffs.
    objective:
      kind: reach
      radius: 3
      zone: zone_42_40
      template_id: ruined_watchtower
    on_complete: return_to_renn
  - id: return_to_renn
    text: Report back to Captain Renn.
    on_complete: done
rewards:
  - gold: 40
  - xp: 80
