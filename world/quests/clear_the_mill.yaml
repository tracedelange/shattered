id: clear_the_mill
name: Clear the Mill
giver: warden_post_captain
zone: river_crossing

description: >
  A Warden on the east bank asks for help. Goblins have nested in the ruined
  mill north of the west landing. The Wardens hold the bridge, not the far
  bank — they cannot move on the mill without abandoning the post they were
  assigned to keep. They need someone expendable to do it instead.

stages:
  - id: start
    text: Speak with the Warden on the east bank about the old mill.
    on_complete: clear_mill

  - id: clear_mill
    text: >
      Cross to the west bank and drive the goblins out of the ruined mill.
      The Wardens want it empty — not cleared for use, just cleared of goblins.
    objective:
      kind: kill_count
      template_id: goblin
      zone: river_crossing
      target: 5
    on_complete: report_back

  - id: report_back
    text: Return to the Warden on the east bank and report the mill is clear.
    on_complete: done

rewards:
  - gold: 75
  - item: iron_sword

# Lore hook: the mill is pre-Sundering industry — a waterwheel, a millrace,
# the stub of a dock. Clearing it raises the question of what it was for and
# why nobody has rebuilt it. The Wardens do not rebuild things; they guard
# what crosses between them. That distinction is the whole of their purpose now.
completion_note: >
  The warden_guard dialogue already contains the closing beat:
  "The old barge lines ran all the way to the delta, once. Not anymore."
  No mob file modification required — the line surfaces naturally after
  the quest completes and the player speaks with the guard again.
