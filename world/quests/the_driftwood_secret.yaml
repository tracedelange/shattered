id: the_driftwood_secret
name: The Driftwood Secret
giver: fisherman
zone: zone_41_39
description: |
  An old fisherman believes something of value has washed up among the driftwood piles in the Salty Reach. He is too frail to retrieve it himself.
stages:
  - id: start
    text: "Talk to the fisherman about the drift."
  - id: search_reach
    text: "Search the driftwood piles of Salty Reach."
    objective:
      kind: reach
      radius: 3
      zone: zone_39_39
      template_id: driftwood_cache
    on_complete: report_back
  - id: report_back
    text: "Return to the fisherman with the news."
rewards:
  - gold: 50
  - xp: 20
