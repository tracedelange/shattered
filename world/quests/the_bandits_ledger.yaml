id: the_bandits_ledger
name: The Bandit's Ledger
giver: captain_renn
zone: village_41_41
description: |
  Captain Renn suspects the bandits of the Crossroads Plain are coordinating larger raids. 
  He needs the ledger from their hideout to uncover their plans.
stages:
  - id: start
    text: "Speak with Captain Renn about the bandit movements."
    on_complete: reach_hideout
  - id: reach_hideout
    text: "Locate the bandit hideout in the Crossroads Plain."
    objective:
      kind: reach
      zone: zone_40_40_bandit_hideout
    on_complete: kill_leader
  - id: kill_leader
    text: "Eliminate the Bandit Captain."
    objective:
      kind: kill_count
      target: 1
      template_id: bandit_captain
    on_complete: collect_ledger
  - id: collect_ledger
    text: "Retrieve the bandit's ledger."
    objective:
      kind: collect_count
      item_base: bandit_ledger
      target: 1
    on_complete: report_back
  - id: report_back
    text: "Return to Captain Renn with the ledger."
    on_complete: done
rewards:
  - gold: 100
  - xp: 200
