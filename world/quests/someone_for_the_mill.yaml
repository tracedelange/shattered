id: someone_for_the_mill
name: Someone for the Mill
giver: warden_guard
zone: river_crossing

description: |
  The mill is clear — goblins gone, structure intact. The Warden on the
  east bank can see it from his post: millrace still connected, wheel
  housing still standing, a working site waiting for someone who works.
  The Wardens hold crossings. They do not rebuild things. Someone else
  should, and the Warden is not above asking an outsider to find that
  someone.

stages:
  - id: start
    text: >
      The mill is clear. The Warden on the east bank considers the empty
      structure across the river — still sound, still connected to the
      millrace. The Wardens will not rebuild it themselves. Someone should
      at least look at it.
    on_complete: find_a_merchant

  - id: find_a_merchant
    text: >
      Cross back to Firdale and find a merchant willing to ride out and
      look at the mill. Not a commitment — just a look. That is as far
      as the Warden will push it.
    objective:
      kind: talk
      target_template: merchant
    on_complete: report_back

  - id: report_back
    text: Return to the Warden and report whether a merchant is interested.
    on_complete: done

rewards:
  - gold: 45

# Lore hook: the Warden frames this as "not our job to rebuild, just our
# job to hold" — the economic gap at the crossing is visible without being
# resolved. A merchant expressed interest; no faction committed, no rebuild
# begun. The mill sits ready for a later arc beat to claim it.
