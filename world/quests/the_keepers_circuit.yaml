id: the_keepers_circuit
name: The Keeper's Circuit
giver: old_stones_hermit
zone: the_old_stones

description: |
  The hermit says the seven stones in the standing circle are not the same
  inscription. Most people do not notice that. They seem to think you might.

stages:
  - id: start
    text: The hermit invites you to walk the standing circle in the western courtyard.
    on_complete: walk_the_circle

  - id: walk_the_circle
    text: >
      Seven stones, seven cuts, none identical. Walk the standing circle in
      the western courtyard and examine each face.
    objective:
      kind: reach
      zone: the_old_stones
      x: 11
      y: 33
      radius: 6
    on_complete: enter_sanctum

  - id: enter_sanctum
    text: >
      The hermit mentioned a room at the north end of the complex. The watchers
      do not leave it. Press north through the central hall and find it.
    objective:
      kind: reach
      zone: the_old_stones
      x: 32
      y: 11
      radius: 4
    on_complete: report_back

  - id: report_back
    text: Return to the hermit and tell them what you found.
    on_complete: done

rewards:
  - xp: 130
  - gold: 70

# Lore hook: the inner sanctum contains the bowl depression — same dimensions
# as the sealed room dais beneath Firdale. Players who completed
# beneath_the_square or what_the_ledger_says will recognize the measurement
# without any NPC naming the connection.
#
# Closing beat: "You found it, then. Most do not go that far."
# No explanation offered. The recognition is the player's, not the NPC's.
