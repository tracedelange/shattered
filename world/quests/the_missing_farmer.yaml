id: the_missing_farmer
name: The Missing Farmer
giver: merchant
zone: starting_village

description: >
  A farmer has gone missing on the road north. The merchant in the market
  asks any passing adventurer to investigate.

stages:
  - id: start
    text: Speak to the merchant about the missing farmer.
    on_complete: investigate

  - id: investigate
    text: Search the dark forest for signs of the farmer.
    on_complete: report_back

  - id: report_back
    text: Return to the merchant with what you found.
    on_complete: done

rewards:
  - gold: 50
  - item: iron_sword
