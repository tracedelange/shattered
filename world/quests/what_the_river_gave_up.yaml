id: what_the_river_gave_up
name: What the River Gave Up
giver: warden_post_captain
zone: river_crossing

description: |
  The Warden captain on the east bank has noticed the river giving things
  back. The water has been rising since the Sundering, but the silt shifts
  too — and when the silt shifts, what it held for an age comes to the
  surface. A barge hull is showing along the west bank where the old trade
  routes used to land. The captain wants eyes on it before the goblins
  pick it apart.

stages:
  - id: start
    text: Speak with the Warden captain about what the river has uncovered.
    on_complete: examine_the_wreck

  - id: examine_the_wreck
    text: >
      Cross to the west bank and find the barge hull the receding silt
      uncovered. The captain wants to know what era it belongs to and
      whether the cargo space is intact enough to identify what it carried.
    objective:
      kind: reach
      template_id: barge_wreck
      zone: river_crossing
      radius: 2
    on_complete: clear_the_riverbank

  - id: clear_the_riverbank
    text: >
      Goblins have noticed the wreckage. Clear enough of them from the
      west bank for the Wardens to send a survey party across safely.
    objective:
      kind: kill_count
      template_id: goblin
      zone: river_crossing
      target: 4
    on_complete: report_back

  - id: report_back
    text: >
      Return to the Warden captain and report what the wreck looked like
      and what the west bank can now bear.
    on_complete: done

rewards:
  - xp: 100
  - gold: 55

# Lore hook: "rising since the Sundering" — already in warden_guard dialogue
# and the lore bible — gets its first mechanical payoff here. The player
# witnesses what the water has uncovered without the world explaining why
# the water is rising. The barge_wreck dialogue names the era by its
# absence: a cargo schedule for a season nobody in the village can name.
# The captain's framing uses the geological fact as the hook, not the cargo —
# the cargo is the artifact, the river is the story. That register matches
# his established voice: specific, remit-bounded, incurious about what he
# cannot hold.
