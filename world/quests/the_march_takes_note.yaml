id: the_march_takes_note
name: The March Takes Note
giver: herald_post_herald
zone: starting_village
repeatable: true

description: |
  The March herald has been in Firdale longer than a courtesy visit requires.
  He frames what he wants as a request — information, not orders — but the
  implication is plain: the north road is under pressure and the March would
  like to know how much. He is not asking you to solve it. He is asking you
  to look, count, and come back.

stages:
  - id: start
    text: Speak with the March herald about what brought him to Firdale.
    on_complete: locate_the_lair

  - id: locate_the_lair
    text: >
      The herald wants a count, not a campaign — find the goblin lair in the
      dark forest and confirm how far the infestation has spread from the
      village road.
    objective:
      kind: reach
      template_id: goblin
      zone: dark_forest
      radius: 4
    on_complete: thin_the_numbers

  - id: thin_the_numbers
    text: >
      Reduce the goblin presence in the forest. The herald wants pressure off
      the north road, not an extermination — enough to matter, enough to report.
    objective:
      kind: kill_count
      template_id: goblin
      zone: dark_forest
      target: 6
    on_complete: report_back

  - id: report_back
    text: Return to the herald at the village square with a count of the dead.
    on_complete: done

rewards:
  - gold: 65
  - item: leather_chest

# Lore hook: the March does not formally admit it needs help — "a request,
# not an order" is the herald's framing throughout. Completion earns the same
# dismissive acknowledgment his dialogue already promises:
# "The March acknowledges the service. As always."
# The forest remains dangerous after this quest. Six kills thin the pressure;
# they do not end it. The March's reach is selective — this is what selective looks like.
