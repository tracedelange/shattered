id: into_the_hold
name: Into the Hold
giver: herald_post_herald
zone: starting_village
unlock_after: the_march_takes_note

description: |
  The herald has considered the forest reports. Thinning goblins does not
  thin the source. He wants to know what is at the end of the east track —
  not a count of the dead, a count of what is alive in there and who is
  giving orders. Scout the Hold and come back.

stages:
  - id: start
    text: The herald wants eyes inside the Hold at the end of the east track.
    on_complete: reach_the_ward

  - id: reach_the_ward
    text: >
      Follow the east track through the dark forest goblin camp and past the
      lair boundary. The track continues. Find where it ends.
    objective:
      kind: reach
      template_id: goblin
      zone: goblin_castle
      radius: 6
    on_complete: press_to_the_keep

  - id: press_to_the_keep
    text: >
      The outer ward has numbers and structure. Push past it into the keep
      and confirm who is giving the orders.
    objective:
      kind: reach
      template_id: hobgoblin
      zone: goblin_castle
      radius: 6
    on_complete: report_back

  - id: report_back
    text: Return to the herald and report what the Hold contains.
    on_complete: done

rewards:
  - xp: 110
  - gold: 55

# Lore hook: the herald receives the report without surprise — he already
# knew the castle existed, has known for longer than the question implies.
# His acknowledgment is the same as always, unchanged by any new information:
# "The March acknowledges the service. As always."
# What changes is that the_warlords_end becomes available. The herald
# does not announce this. He simply has a second request ready.
