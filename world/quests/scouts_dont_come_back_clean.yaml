id: scouts_dont_come_back_clean
name: Scouts Don't Come Back Clean
giver: village_guard
zone: starting_village

description: |
  A village guard has been sending scouts north. They come back wrong —
  jumpy, quiet, refusing to name what they found in the hollow. One did
  not come back at all. The guard wants to know what is up there, and
  admits, without pleasure, that the scouts are no longer the right tool
  for the job.

stages:
  - id: start
    text: Speak with the village guard about what has been pressing in from the north.
    on_complete: reach_the_hollow

  - id: reach_the_hollow
    text: >
      Follow the north road into the dark forest and find the hollow the
      guards described. Something keeps the growth back there — the scouts
      refused to name what, but they all agreed it was not an animal.
    objective:
      kind: reach
      template_id: hollow_watcher
      zone: dark_forest
      radius: 5
    on_complete: examine_the_stone

  - id: examine_the_stone
    text: >
      At the hollow's southern edge stands a stone with no maker's mark.
      Script is cut into its face in no surviving language. Get close
      enough to read it. You will not be able to read it.
    objective:
      kind: reach
      template_id: hollow_watcher
      zone: dark_forest
      radius: 2
    on_complete: press_further_north

  - id: press_further_north
    text: >
      Past the hollow the dirt track continues north to a ruin fragment —
      cut angles and jointing that belong to no kingdom anyone has named.
      The guard wanted to know what is up there. Go find out.
    objective:
      kind: reach
      template_id: farmer_corpse
      zone: dark_forest
      radius: 4
    on_complete: report_back

  - id: report_back
    text: Return to the village guard and tell them what you found in the hollow.
    on_complete: done

rewards:
  - gold: 55

# Lore hook: the hollow_watcher does not attack — the horror is the absence of
# threat. The guard will not know what to make of a report that says "it just
# watched." The standing stone cannot be read; that is the correct outcome —
# the mystery is not payoff, reaching it is. The farmer_corpse at the ruin
# closes the arc spatially without explaining it: something was north of the
# hollow, and now there is a body there too.
#
# Closing beat: the guard is visibly unsettled but offers no explanation.
# The scout who did not come back does not come up again. Neither should
# the quest provide one.
