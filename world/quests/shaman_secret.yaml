id: shaman_secret
name: The Shaman's Secret
giver: guard_captain
zone: village_41_41
description: |
  The goblin shaman in the Tanglewood Edge is rumored to possess a map to a larger hoard in the basins. Captain Renn wants the amulet recovered.
stages:
  - id: start
    text: Speak with the Guard Captain in Firdale.
    on_complete: reach_den
  - id: reach_den
    text: Locate the Goblin Den within the Tanglewood Edge.
    objective:
      kind: reach
      zone: zone_42_41_goblin_den
      radius: 5
    on_complete: kill_shaman
  - id: kill_shaman
    text: Eliminate the Goblin Shaman.
    objective:
      kind: kill_specific
      target_id: goblin_shaman
    on_complete: get_amulet
  - id: get_amulet
    text: Recover the Shaman's Amulet.
    objective:
      kind: collect_count
      item_base: goblin_amulet
      target: 1
    on_complete: report_back
  - id: report_back
    text: Return the amulet to the Guard Captain.
    on_complete: done
rewards:
  - gold: 150
  - xp: 250
