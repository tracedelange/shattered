id: driftwood_cache
name: The Driftwood Cache
giver: village_board
zone: village_41_41
description: |
  A shipment of coastal herbs was lost in a storm, and the wreckage has washed up on the North Shore. 
  The village needs the valuable cargo recovered.
stages:
  - id: start
    text: Read the notice about the lost shipment of coastal herbs.
    on_complete: collect_cargo
  - id: collect_cargo
    text: Collect 3 pieces of lost cargo from the driftwood shore.
    objective:
      kind: collect_count
      item_base: gold_coin
      target: 3
    on_complete: report_to_renn
  - id: report_to_renn
    text: Report back to Captain Renn in Firdale.
    objective:
      kind: talk
      target_template: guard_captain
    on_complete: done
rewards:
  - gold: 30
  - xp: 80
