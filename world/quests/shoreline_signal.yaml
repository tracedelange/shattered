id: shoreline_signal
name: The Shoreline Signal
giver: fisherman
unlock_after: the_ash_shore
zone: village_41_41
description: |
  An abandoned camp on the north shore may contain logs about previous coastal incursions.
stages:
  - id: accept
    text: Read the notice about the abandoned camp on the North Shore.
    on_complete: reach_camp
  - id: reach_camp
    text: Locate the abandoned camp on the North Shore.
    objective:
      kind: reach
      radius: 5
      zone: zone_41_40
      template_id: shore_camp_marker
    on_complete: clear_rats
  - id: clear_rats
    text: Clear the shore rats nesting around the camp to secure the area.
    objective:
      kind: kill_count
      target: 10
      template_id: shore_rat
      zone: zone_41_40
    on_complete: report_renn
  - id: report_renn
    text: Deliver the recovered logs to Captain Renn in Firdale.
    objective:
      kind: talk
      target_template: captain_renn
    on_complete: done
rewards:
  - gold: 80
  - xp: 220
