id: the_stolen_ledger
name: The Stolen Ledger
giver: captain_renn
unlock_after: roadside_rescue
zone: village_41_41
description: |
  A tip on the village board mentions a hidden vault used by bandits to stash their prizes. Recover the stolen gold.
stages:
  - id: read_notice
    text: Read the notice on the village board.
    on_complete: find_cache
  - id: find_cache
    text: Locate the Raider's Cache.
    objective:
      kind: reach
      radius: 0
      zone: zone_40_41_cache
    on_complete: clear_cache
  - id: clear_cache
    text: Clear the bandits from the vault.
    objective:
      kind: kill_count
      target: 3
      template_id: road_bandit
      zone: zone_40_41_cache
    on_complete: recover_gold
  - id: recover_gold
    text: Recover the stolen gold coins.
    objective:
      kind: collect_count
      item_base: gold_coin
      target: 10
    on_complete: report_renn
  - id: report_renn
    text: Report your success to Captain Renn.
    objective:
      kind: talk
      target_template: captain_renn
    on_complete: done
rewards:
  - gold: 180
  - xp: 500
