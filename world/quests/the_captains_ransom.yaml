id: the_captains_ransom
name: The Captain's Ransom
giver: notice_board
zone: village_41_41
description: |
  A high-ranking officer has been captured by bandits. The village needs someone to infiltrate the hideout, eliminate the Bandit Captain, and retrieve the officer's signet ring to prove the rescue or recovery was successful.
stages:
  - id: start
    text: Read the notice on the board.
    on_complete: slay_captain
  - id: slay_captain
    text: Find and defeat the Bandit Captain in the hideout.
    objective:
      kind: kill_count
      target: 1
      template_id: bandit_captain
      zone: zone_40_40_bandit_hideout
    on_complete: recover_ring
  - id: recover_ring
    text: Retrieve the Officer's Signet Ring.
    objective:
      kind: collect_count
      item_base: officers_signet_ring
      target: 1
    on_complete: finish
  - id: finish
    text: Return to the village board to close the request.
rewards:
  - gold: 150
  - xp: 250
