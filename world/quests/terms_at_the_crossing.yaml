id: terms_at_the_crossing
name: Terms at the Crossing
giver: river_merchant
zone: river_crossing
unlock_after: someone_for_the_mill

description: |
  The merchant at the west landing has stood at the river long enough to know
  the structure is sound. What they do not know is what the Wardens will hold
  and what they will not. They will not cross to ask the captain themselves.
  You can.

stages:
  - id: start
    text: |
      The merchant wants to know what the Wardens will and will not guarantee
      if someone rebuilds the mill. They will not cross the bridge to ask the
      captain themselves. Go ask for them.
    on_complete: ask_the_captain

  - id: ask_the_captain
    text: Speak with the Warden captain on the east bank about the mill.
    objective:
      kind: talk
      target_template: warden_captain
    on_complete: report_back

  - id: report_back
    text: Return to the merchant on the west bank with the captain's answer.
    on_complete: done

rewards:
  - xp: 75
  - gold: 40

# Lore hook: the captain stays in register — he holds the bridge, not the bank.
# Safe passage across is a guarantee; what happens west of the bridge is not his
# remit. "I hold the bridge. What happens west of it is not my concern."
#
# The merchant's closing line advances without resolving. The terms are incomplete
# but better than nothing. "A season. I can work a season on those terms."
# The mill remains unbuilt; the decision to wait and see has been made.
# That is the correct outcome — a threshold crossed, not a door opened.
