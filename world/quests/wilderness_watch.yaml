id: wilderness_watch
name: Wilderness Watch
giver: captain_renn
unlock_after: the_wilds_warning
zone: village_41_41
description: |
  The village board posts a plea for help. Suspicious activity has been reported in the western reaches. Captain Renn needs a scout to investigate the area near the old milestone.
stages:
  - id: accept
    text: Read the notice about suspicious activity in the West.
  - id: find_stone
    text: Locate the ancient milestone in the Wester-Wilds.
    objective:
      kind: reach
      radius: 2
      zone: zone_39_41
      template_id: milestone_stone
    on_complete: clear_bandits
  - id: clear_bandits
    text: Eliminate the road bandit scouts in the area.
    objective:
      kind: kill_count
      target: 4
      template_id: road_bandit
      zone: zone_39_41
    on_complete: report_renn
  - id: report_renn
    text: Report your success to Captain Renn in Firdale.
    objective:
      kind: talk
      target_template: captain_renn
    on_complete: done
  - id: done
    text: Quest complete.
rewards:
  - gold: 80
  - xp: 200
