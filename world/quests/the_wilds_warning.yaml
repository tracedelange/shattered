id: the_wilds_warning
name: The Wilds' Warning
giver: captain_renn
unlock_after: the_bandit_toll
zone: village_41_41
description: |
  A notice on the village board warns of suspicious movements in the far west. 
  Captain Renn wants the area scouted and cleared.
stages:
  - id: start
    text: Read the warning on the village board.
    on_complete: find_stone
  - id: find_stone
    text: Locate the ancient milestone in the Wester-Wilds.
    objective:
      kind: reach
      radius: 5
      template_id: milestone_stone
      zone: zone_39_41
    on_complete: clear_bandits
  - id: clear_bandits
    text: Eliminate the bandit scouts scouting the area.
    objective:
      kind: kill_count
      target: 5
      template_id: road_bandit
      zone: zone_39_41
    on_complete: report_renn
  - id: report_renn
    text: Report back to Captain Renn in Firdale.
    objective:
      kind: talk
      target_template: captain_renn
    on_complete: done
rewards:
  - gold: 60
  - xp: 140
