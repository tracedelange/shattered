id: roadside_rescue
name: Roadside Rescue
giver: captain_renn
unlock_after: quest_boundary_walk
zone: village_41_41
description: |
  A courier was ambushed near the milestone on the Western Road. 
  The guards believe they may still be alive beneath the wreckage of their wagon.
stages:
  - id: reach_wagon
    text: Locate the ruined wagon on the Western Road.
    objective:
      kind: reach
      radius: 5
      zone: zone_40_41
      template_id: ruined_wagon
    on_complete: clear_bandits
  - id: clear_bandits
    text: Clear the area of bandits to ensure the courier's safety.
    objective:
      kind: kill_count
      target: 5
      template_id: road_bandit
      zone: zone_40_41
    on_complete: talk_courier
  - id: talk_courier
    text: Speak with the wounded courier.
    objective:
      kind: talk
      target_template: wounded_courier
    on_complete: report_rescue
  - id: report_rescue
    text: Return to the Firdale guards to report the rescue.
    on_complete: done
rewards:
  - gold: 130
  - xp: 380
