id: quest_boundary_walk
name: The Boundary Walk
giver: village_notice_board
zone: village_41_41
description: |
  The boundary markers in Hollow Way have been neglected or destroyed. 
  Locate the remaining fence line and clear out the bandits who have 
  settled there.
stages:
  - id: start
    text: Read the notice regarding the missing boundary markers.
    on_complete: locate_fence
  - id: locate_fence
    text: Locate the weathered boundary fence in Hollow Way.
    objective:
      kind: reach
      radius: 3
      zone: zone_40_42
      template_id: weathered_fence
    on_complete: clear_bandits
  - id: clear_bandits
    text: Eliminate the bandits guarding the fence line.
    objective:
      kind: kill_count
      target: 4
      template_id: road_bandit
      zone: zone_40_42
    on_complete: report_renn
  - id: report_renn
    text: Report the status of the boundary to Captain Renn.
    objective:
      kind: talk
      target_template: captain_renn
    on_complete: complete
  - id: complete
    text: The boundary walk is complete.
rewards:
  - gold: 30
  - xp: 60
